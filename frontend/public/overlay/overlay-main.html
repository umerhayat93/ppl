<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>PSL Overlay</title>

<link rel="stylesheet" href="overlay.css">
</head>

<body>

<div class="bar">

  <!-- LEFT -->
  <div class="left">
    <img src="/icons/ppl-logo-full.png" class="logo">

    <div class="teams" id="teams">PZ v RP</div>

    <div class="score-box" id="score">48-0</div>

    <div class="overs" id="overs">4.3</div>

    <div class="powerplay">P</div>
  </div>

  <!-- CENTER -->
  <div class="center">
    <div id="striker" class="batsman striker">HARIS 24 12</div>
    <div id="nonstriker" class="batsman">BABAR 22 16</div>
  </div>

  <!-- RIGHT -->
  <div class="right">
    <div class="bowler" id="bowler">NASEEM 0-0 0.3</div>
    <div class="required" id="required">REQ 10.77</div>

    <div class="thisover">
      THIS OVER
      <div class="balls" id="balls"></div>
    </div>
  </div>

</div>

<script src="overlay.js"></script>

</body>
  </html>
