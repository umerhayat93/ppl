<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Live Overlay</title>

  <script src="https://cdn.socket.io/4.5.4/socket.io.min.js"></script>

  <style>
    body {
      margin: 0;
      background: transparent;
      font-family: Arial;
      color: white;
    }

    .overlay {
      position: absolute;
      bottom: 30px;
      left: 30px;
      background: rgba(0,0,0,0.7);
      padding: 20px;
      border-radius: 15px;
      min-width: 350px;
    }

    .teams {
      font-size: 22px;
      font-weight: bold;
    }

    .score {
      font-size: 28px;
      margin-top: 10px;
    }

    .overs {
      font-size: 16px;
      margin-top: 5px;
      opacity: 0.8;
    }

    .ball {
      margin-top: 10px;
      font-size: 18px;
      color: yellow;
    }
  </style>
</head>

<body>

<div class="overlay">
  <div class="teams" id="teams">Loading...</div>
  <div class="score" id="score">--</div>
  <div class="overs" id="overs">--</div>
  <div class="ball" id="ball">Waiting...</div>
</div>

<script>
  const socket = io("https://ppl2026-backend.onrender.com");

  console.log("Connecting to WebSocket...");

  socket.on("connect", () => {
    console.log("Connected ✅");
  });

  // 🔥 IMPORTANT: match this with your backend emit event
  socket.on("live_update", (data) => {
    console.log("Live Data:", data);

    document.getElementById("teams").innerText =
      data.teamA + " vs " + data.teamB;

    document.getElementById("score").innerText =
      data.score;

    document.getElementById("overs").innerText =
      "Overs: " + data.overs;

    document.getElementById("ball").innerText =
      "Last Ball: " + data.lastBall;
  });

  socket.on("disconnect", () => {
    console.log("Disconnected ❌");
  });
</script>

</body>
</html>
