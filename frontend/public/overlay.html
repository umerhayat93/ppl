<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PPL 2026 Live Overlay</title>
<style>
*,*::before,*::after { box-sizing: border-box; margin: 0; padding: 0; }
html, body {
  width: 100vw; height: 100vh;
  background: transparent;
  overflow: hidden;
  font-family: 'Arial Narrow', 'Roboto Condensed', Arial, sans-serif;
  -webkit-font-smoothing: antialiased;
}

/* ═══════════════════════════════════════════════
   DESIGN TOKENS
═══════════════════════════════════════════════ */
:root {
  --jazz-top:  #d9e021;
  --jazz-bot:  #76b82a;
  --navy:      #00004d;
  --text-dark: #002300;
  --highlight: #fef200;
  --bar-h:       clamp(64px, 9.5vh, 90px);
  --logo-w:      clamp(58px, 7.2vw, 90px);
  --score-w:     clamp(260px, 35vw, 460px);
  --stats-w:     clamp(220px, 30vw, 400px);
}

/* ═══════════════════════════════════════════════
   SPONSOR — top right
═══════════════════════════════════════════════ */
#sponsor { position: fixed; top: 1.6vh; right: 1.4vw; z-index: 100; }
.sponsor-box {
  background: linear-gradient(135deg, rgba(0,50,110,0.9), rgba(0,25,70,0.93));
  border: 1px solid rgba(135,206,250,0.4);
  border-radius: 0.5vw;
  padding: 0.45vh 1.1vw 0.4vh;
  text-align: center; position: relative; overflow: hidden;
  animation: sponsorPulse 4s ease-in-out infinite;
}
@keyframes sponsorPulse {
  0%,100% { box-shadow: 0 2px 14px rgba(0,100,255,0.2); }
  50%     { box-shadow: 0 2px 22px rgba(0,160,255,0.4); }
}
.sponsor-box::after {
  content: ''; position: absolute; top: 0; left: -60%; width: 35%; height: 100%;
  background: linear-gradient(90deg, transparent, rgba(255,255,255,0.07), transparent);
  animation: shimmer 4.5s ease-in-out infinite;
}
@keyframes shimmer { 0% { left: -60%; } 100% { left: 140%; } }
.sname { font-family: 'Arial Black', Arial, sans-serif; font-size: clamp(9px,1.15vw,15px); font-weight: 900; color: #87CEFA; letter-spacing: 0.1vw; text-transform: uppercase; position: relative; z-index: 1; }
.stag  { font-size: clamp(6px,0.55vw,8px); color: rgba(200,230,255,0.6); letter-spacing: 0.18vw; text-transform: uppercase; margin-top: 0.1vh; position: relative; z-index: 1; }

/* ═══════════════════════════════════════════════
   WATERMARK — top left
═══════════════════════════════════════════════ */
#watermark { position: fixed; top: 1.4vh; left: 1.3vw; display: flex; align-items: center; gap: 0.6vw; z-index: 50; filter: drop-shadow(0 2px 8px rgba(0,0,0,0.8)); }
#watermark img { width: clamp(34px,4.5vw,58px); height: clamp(34px,4.5vw,58px); object-fit: contain; border-radius: 0.45vw; }
.wm-tag  { font-size: clamp(6px,0.6vw,9px); color: #87CEFA; font-weight: 700; letter-spacing: 0.2vw; text-transform: uppercase; line-height: 1; }
.wm-name { font-family: 'Arial Black', Arial, sans-serif; font-size: clamp(11px,1.6vw,22px); font-weight: 900; color: #fff; line-height: 1; }

/* ═══════════════════════════════════════════════
   NO LIVE
═══════════════════════════════════════════════ */
#no-live { position: fixed; inset: 0; background: rgba(0,8,25,0.92); display: flex; align-items: center; justify-content: center; flex-direction: column; gap: 1.8vh; z-index: 200; }
#no-live h2 { font-size: clamp(13px,2vw,28px); color: rgba(135,206,250,0.45); font-weight: 900; letter-spacing: 0.35vw; text-transform: uppercase; }
#no-live p  { font-size: clamp(8px,0.85vw,12px); color: rgba(135,206,250,0.25); letter-spacing: 0.18vw; }

/* ═══════════════════════════════════════════════
   CIRCULAR ALERTS — UNCHANGED
═══════════════════════════════════════════════ */
.alert {
  position: fixed; top: 40%; left: 50%;
  transform: translate(-50%,-50%) scale(0);
  width: clamp(170px,26vw,320px); height: clamp(170px,26vw,320px);
  border-radius: 50%;
  display: flex; flex-direction: column; align-items: center; justify-content: center;
  z-index: 999; pointer-events: none; gap: 0.2vw;
  backdrop-filter: blur(6px);
}
.alert.show { animation: alertSpring 3.8s cubic-bezier(.34,1.56,.64,1) forwards; }
@keyframes alertSpring {
  0%   { transform: translate(-50%,-50%) scale(0);   opacity: 0; }
  9%   { transform: translate(-50%,-50%) scale(1.1); opacity: 1; }
  16%  { transform: translate(-50%,-50%) scale(0.95); }
  22%  { transform: translate(-50%,-50%) scale(1.03); }
  28%  { transform: translate(-50%,-50%) scale(1);   opacity: 1; }
  76%  { transform: translate(-50%,-50%) scale(1);   opacity: 1; }
  100% { transform: translate(-50%,-50%) scale(0.7); opacity: 0; }
}
#alert-six    { background: radial-gradient(circle at 40% 40%, rgba(0,70,15,0.93), rgba(0,25,5,0.97) 70%);  border: clamp(2px,0.28vw,4px) solid rgba(0,220,65,0.8);   box-shadow: 0 0 clamp(20px,4.5vw,70px) rgba(0,200,55,0.45); }
#alert-four   { background: radial-gradient(circle at 40% 40%, rgba(0,18,95,0.93), rgba(0,6,38,0.97) 70%);  border: clamp(2px,0.28vw,4px) solid rgba(55,135,255,0.85); box-shadow: 0 0 clamp(20px,4.5vw,70px) rgba(35,115,255,0.45); }
#alert-wicket { background: radial-gradient(circle at 40% 40%, rgba(95,0,0,0.93),  rgba(38,0,0,0.97) 70%);  border: clamp(2px,0.28vw,4px) solid rgba(255,45,15,0.85);  box-shadow: 0 0 clamp(20px,4.5vw,70px) rgba(255,35,0,0.45); }
.alert-logo   { width: clamp(28px,4.5vw,60px); height: clamp(28px,4.5vw,60px); object-fit: contain; border-radius: 0.6vw; filter: drop-shadow(0 0 0.5vw rgba(255,255,255,0.4)); }
.alert-word   { font-family: 'Arial Black', Arial, sans-serif; font-size: clamp(22px,4.8vw,66px); font-weight: 900; text-transform: uppercase; line-height: 1; animation: aGlow 0.5s ease infinite alternate; }
@keyframes aGlow { from { filter: brightness(1); } to { filter: brightness(1.55) drop-shadow(0 0 0.5vw currentColor); } }
#alert-six    .alert-word { color: #00ff58; }
#alert-four   .alert-word { color: #4aabff; }
#alert-wicket .alert-word { color: #ff5533; }
.alert-emoji  { font-size: clamp(14px,2.6vw,38px); line-height: 1; }
.alert-player { font-size: clamp(7px,0.9vw,12px); color: rgba(220,240,255,0.82); font-weight: 700; letter-spacing: 0.08vw; text-align: center; max-width: 86%; line-height: 1.3; }
.alert-ppl    { font-family: 'Arial Black', Arial, sans-serif; font-size: clamp(6px,0.7vw,10px); font-weight: 900; letter-spacing: 0.42vw; text-transform: uppercase; opacity: 0.52; margin-top: 0.12vw; }
#alert-six    .alert-ppl { color: #88ffaa; }
#alert-four   .alert-ppl { color: #88ccff; }
#alert-wicket .alert-ppl { color: #ffaa88; }

/* ═══════════════════════════════════════════════════════════════════
   SCOREBAR
   ┌──────────┬──────────────────────────────────┬────────────────────────────────┬──────────┐
   │ LOGO BOX │  SCORE SECTION (green gradient)  │  STATS SECTION (navy, overlap) │ PPL LOGO │
   └──────────┴──────────────────────────────────┴────────────────────────────────┴──────────┘
   Score section has two rows:
     top:    Team v Team | Score | Overs
     bottom: [Striker pill]  [Non-striker pill]
   Stats section has two rows:
     top:    RR label+value | 🔴 Bowler | W-R  Ov
     bottom: THIS OVER  ● ● ● ● ● ●
═══════════════════════════════════════════════════════════════════ */

#bar {
  position: fixed;
  bottom: 0;
  left: 0;
  right: 0;
  width: 100vw;
  height: var(--bar-h);
  display: none;
  flex-direction: row;
  align-items: stretch;
  filter: drop-shadow(0 4px 24px rgba(0,0,0,0.55));
}

/* ── 1. LEFT LOGO BOX ── */
.logo-box {
  flex: 0 0 var(--logo-w);
  height: 100%;
  background-color: var(--navy);
  border-radius: clamp(10px,1.4vw,20px) 0 0 clamp(10px,1.4vw,20px);
  border-right: 1px solid rgba(255,255,255,0.15);
  display: flex; align-items: center; justify-content: center;
  z-index: 3; flex-shrink: 0;
  overflow: hidden;
}
.logo-box img {
  width: clamp(32px,4.2vw,58px); height: clamp(32px,4.2vw,58px);
  object-fit: contain; border-radius: 0.3vw;
}

/* ── 2. SCORE SECTION (green/yellow gradient) ── */
.score-section {
  flex: 1 1 0;
  min-width: clamp(200px, 28vw, 420px);
  height: 100%;
  background: linear-gradient(to bottom, var(--jazz-top) 0%, var(--jazz-bot) 100%);
  border-radius: 0 clamp(14px,2vw,28px) clamp(14px,2vw,28px) 0;
  box-shadow: clamp(4px,0.5vw,8px) 0 clamp(10px,1.5vw,20px) rgba(0,0,0,0.35);
  display: flex; flex-direction: column; justify-content: center;
  padding: 0 clamp(14px,1.8vw,28px);
  z-index: 2; flex-shrink: 0;
  overflow: hidden;
  gap: clamp(3px,0.5vh,6px);
}

/* Score top: Team v Team | Runs | Overs */
.score-top {
  display: flex; align-items: center;
  justify-content: space-between;
  color: var(--text-dark);
  line-height: 1;
}
.team-vs {
  font-family: 'Arial Black', Arial, sans-serif;
  font-size: clamp(11px,1.4vw,20px); font-weight: 900;
  white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
  flex: 1; min-width: 0;
}
.team-vs .sep {
  font-weight: 400; font-size: 0.72em;
  margin: 0 0.22vw; opacity: 0.6;
}

/* ── Batting team highlight ── */
#t-field {
  opacity: 0.58;
  font-size: 0.88em;
}
#t-bat {
  position: relative;
  color: #001a00;
  text-shadow: 0 0 10px rgba(254,242,0,0.25);
  border-bottom: 2px solid rgba(254,242,0,0.88);
  padding-bottom: 1px;
}
#t-bat::after {
  content: 'BAT';
  font-size: 0.52em; font-weight: 900;
  color: rgba(0,18,0,0.75);
  background: rgba(254,242,0,0.82);
  padding: 1px 3.5px;
  border-radius: 3px;
  margin-left: 5px;
  letter-spacing: 0.04em;
  vertical-align: middle;
  border: none;
  line-height: 1;
}
.main-runs {
  font-family: 'Arial Black', Arial, sans-serif;
  font-size: clamp(18px,3.2vw,46px); font-weight: 900;
  white-space: nowrap; flex-shrink: 0;
  margin: 0 clamp(8px,1.1vw,18px);
  letter-spacing: -0.03vw;
}
.overs-val {
  font-family: 'Arial Black', Arial, sans-serif;
  font-size: clamp(11px,1.45vw,20px); font-weight: 900;
  white-space: nowrap; flex-shrink: 0;
}
.inn-badge {
  width: clamp(12px,1.4vw,18px); height: clamp(12px,1.4vw,18px);
  border-radius: 50%;
  background: rgba(0,0,0,0.18); border: 1.5px solid rgba(0,0,0,0.25);
  display: flex; align-items: center; justify-content: center;
  font-size: clamp(6px,0.72vw,10px); font-weight: 900; color: #fff;
  flex-shrink: 0; margin-left: clamp(4px,0.5vw,8px);
}

/* Batter pills row — visually separate from team area */
.batsmen-row {
  display: flex; gap: clamp(4px,0.55vw,8px);
  overflow: hidden;
  margin-top: clamp(1px,0.15vh,2px);
  padding-top: clamp(3px,0.35vh,5px);
  border-top: 1px solid rgba(0,0,0,0.13);
  position: relative;
}
/* Soft glass backing behind the pills row */
.batsmen-row::before {
  content: '';
  position: absolute; inset: 0;
  background: rgba(0,0,0,0.07);
  border-radius: clamp(3px,0.4vw,6px);
  backdrop-filter: blur(2px);
  pointer-events: none;
}
.bat-pill {
  display: flex; align-items: center;
  padding: clamp(2px,0.35vh,5px) clamp(7px,0.95vw,14px);
  border-radius: clamp(4px,0.55vw,8px);
  font-size: clamp(8px,0.95vw,13px); font-weight: 700;
  text-transform: uppercase; white-space: nowrap;
  color: #fff; flex-shrink: 0;
  overflow: hidden;
  position: relative; z-index: 1;
  transition: box-shadow 0.4s ease;
}
/* Striker — deep navy glass with strong gold glow */
.bat-pill.striker {
  background: linear-gradient(145deg, rgba(12,28,70,0.96), rgba(6,14,46,0.98));
  border: 1.5px solid rgba(255,215,0,0.92);
  box-shadow:
    0 0 14px rgba(255,210,0,0.35),
    0 0  5px rgba(255,215,0,0.18) inset,
    inset 0 1px 0 rgba(255,240,130,0.18);
  backdrop-filter: blur(8px);
}
/* Non-striker — same navy, no glow, muted border */
.bat-pill.nstriker {
  background: linear-gradient(145deg, rgba(10,22,60,0.72), rgba(5,12,40,0.78));
  border: 1.5px solid rgba(255,215,0,0.28);
  opacity: 0.80;
  backdrop-filter: blur(5px);
}
.bat-name  { font-weight: 900; letter-spacing: 0.02vw; }
.bat-star  {
  color: var(--highlight); font-weight: 900; font-size: 1.15em;
  margin-left: 1px;
  text-shadow: 0 0 6px rgba(254,242,0,0.6);
}
.bat-score {
  font-family: 'Arial Black', Arial, sans-serif;
  font-size: clamp(9px,1.1vw,15px); font-weight: 900;
  margin-left: clamp(5px,0.65vw,10px);
  color: #fff;
  text-shadow: 0 1px 3px rgba(0,0,0,0.4);
}
.bat-b { font-size: 0.72em; opacity: 0.72; margin-left: clamp(2px,0.2vw,3px); font-weight: 400; }

/* ── 3. STATS SECTION (navy, overlaps score section) ── */
.stats-section {
  flex: 1 1 0;
  min-width: clamp(180px, 24vw, 380px);
  height: calc(var(--bar-h) * 0.88);
  align-self: center;
  background-color: var(--navy);
  border-radius: 0 clamp(10px,1.4vw,18px) clamp(10px,1.4vw,18px) 0;
  margin-left: clamp(-16px,-2vw,-8px);
  padding: clamp(5px,0.7vh,9px) clamp(12px,1.5vw,22px) clamp(5px,0.7vh,9px) clamp(22px,2.8vw,38px);
  display: flex; flex-direction: row; align-items: center;
  z-index: 1; flex-shrink: 0;
  gap: clamp(8px,1vw,16px);
  overflow: hidden;
}

/* ── RR block — left side of stats ── */
.rr-block {
  display: flex; flex-direction: column; align-items: center; justify-content: center;
  padding: clamp(4px,0.5vh,7px) clamp(9px,1.1vw,16px);
  border-radius: clamp(5px,0.55vw,9px);
  background: linear-gradient(145deg, rgba(130,42,0,0.62), rgba(75,18,0,0.75));
  border: 1.5px solid rgba(255,125,35,0.65);
  box-shadow:
    0 0 14px rgba(255,100,0,0.16),
    inset 0 1px 0 rgba(255,190,100,0.12),
    inset 0 -1px 0 rgba(0,0,0,0.2);
  flex-shrink: 0; white-space: nowrap;
}
.rr-lbl {
  font-size: clamp(5px,0.52vw,8px); font-weight: 700;
  color: rgba(255,200,140,0.82); text-transform: uppercase;
  letter-spacing: 0.12vw; line-height: 1;
}
.rr-val {
  font-family: 'Arial Black', Arial, sans-serif;
  font-size: clamp(12px,1.6vw,22px); font-weight: 900;
  color: var(--highlight); line-height: 1.1;
  text-shadow: 0 0 10px rgba(254,242,0,0.55), 0 1px 3px rgba(0,0,0,0.4);
}

/* ── BOWLER PILL — independent premium purple pill ── */
.bowl-pill {
  flex: 1; min-width: 0;
  display: flex; flex-direction: column; justify-content: center;
  gap: clamp(2px,0.32vh,5px);
  padding: clamp(4px,0.5vh,7px) clamp(9px,1.1vw,16px);
  border-radius: clamp(5px,0.55vw,9px);
  background:
    linear-gradient(145deg, rgba(38,0,105,0.78), rgba(16,0,58,0.90));
  border: 1.5px solid rgba(145,72,255,0.50);
  box-shadow:
    0 0 18px rgba(110,45,240,0.18),
    inset 0 1px 0 rgba(195,155,255,0.14),
    inset 0 -1px 0 rgba(0,0,0,0.25),
    inset 1px 0 8px rgba(100,40,200,0.06);
  overflow: hidden;
}

/* Bowler top row: dot + name + figures */
.bowl-top-row {
  display: flex; align-items: center; justify-content: space-between;
  gap: clamp(4px,0.5vw,8px);
  min-width: 0;
}
.bowl-name-wrap {
  display: flex; align-items: center; gap: clamp(4px,0.45vw,6px);
  min-width: 0; overflow: hidden; flex: 1;
}
.bowl-dot {
  width: clamp(7px,0.9vw,12px); height: clamp(7px,0.9vw,12px);
  border-radius: 50%; flex-shrink: 0;
  background: radial-gradient(circle at 35% 35%, #ffffff 0%, #cccccc 100%);
  border: 1px solid rgba(200,200,200,0.5);
  box-shadow: 0 0 4px rgba(255,255,255,0.25);
  position: relative;
}
.bowl-dot::after {
  content: '';
  position: absolute; inset: 0; border-radius: 50%;
  background: linear-gradient(135deg, transparent 42%, rgba(200,0,0,0.35) 42%, rgba(200,0,0,0.35) 48%, transparent 48%);
}
/* Bowler name — primary, bright, dominant */
.bowl-name {
  font-family: 'Arial Black', Arial, sans-serif;
  font-size: clamp(10px,1.2vw,17px); font-weight: 900;
  color: #fff;
  text-transform: uppercase; white-space: nowrap;
  overflow: hidden; text-overflow: ellipsis; line-height: 1;
  text-shadow: 0 0 10px rgba(200,160,255,0.35), 0 1px 3px rgba(0,0,0,0.5);
  letter-spacing: 0.03vw;
}
/* Bowler figures — secondary, muted lavender */
.bowl-fig {
  font-size: clamp(10px,1.15vw,15px); font-weight: 700;
  color: rgba(210,185,255,0.82); white-space: nowrap; flex-shrink: 0;
  line-height: 1; letter-spacing: 0.02vw;
}
.bowl-fig small {
  font-size: 0.66em; opacity: 0.62; font-weight: 400;
  margin-left: 0.12vw; color: rgba(190,165,255,0.7);
}

/* THIS OVER row — tertiary, inside pill */
.bowl-over-row {
  display: flex; align-items: center;
  gap: clamp(5px,0.6vw,9px);
  overflow: hidden;
  padding-top: clamp(1px,0.15vh,2px);
  border-top: 1px solid rgba(160,120,255,0.15);
}
/* THIS OVER label — tertiary */
.over-lbl {
  font-size: clamp(5px,0.5vw,7px); font-weight: 700;
  color: rgba(190,165,255,0.55); text-transform: uppercase;
  letter-spacing: 0.14vw; white-space: nowrap; flex-shrink: 0;
}
/* Balls row — slightly more spacing for clarity */
.balls-row {
  display: flex; gap: clamp(3px,0.38vw,5px); align-items: center;
  overflow: hidden; flex-wrap: nowrap;
}
.ball {
  width: clamp(14px,1.85vw,24px); height: clamp(14px,1.85vw,24px);
  border-radius: 50%;
  display: flex; align-items: center; justify-content: center;
  font-size: clamp(6px,0.72vw,10px); font-weight: 900;
  flex-shrink: 0;
  box-shadow:
    inset 0 1px 3px rgba(0,0,0,0.35),
    inset 0 -1px 2px rgba(255,255,255,0.06),
    0 1px 3px rgba(0,0,0,0.3);
}
.b-empty { background: rgba(255,255,255,0.05); border: 1.5px solid rgba(255,255,255,0.16); }
.b-dot   { background: rgba(65,75,100,0.75); border: 1.5px solid rgba(120,135,165,0.45); color: rgba(255,255,255,0.65); }
.b-run   { background: linear-gradient(145deg,#1e6613,#145a0a); border: 1.5px solid #42a82a; color: #fff; }
.b-four  { background: linear-gradient(145deg,#0038c8,#0025a0); border: 1.5px solid #4480ff; color: #fff; }
.b-six   { background: linear-gradient(145deg,#c04000,#8c2800); border: 1.5px solid #ff8525; color: #fff; }
.b-wide  { background: rgba(75,55,0,0.85); border: 1.5px solid rgba(165,140,0,0.8); color: #ffe000; font-size: clamp(4px,0.44vw,6px); }
.b-nb    { background: rgba(75,55,0,0.85); border: 1.5px solid rgba(165,140,0,0.8); color: #ffe000; font-size: clamp(4px,0.42vw,6px); }
.b-wkt   {
  background: linear-gradient(145deg,#b80000,#7a0000);
  border: 1.5px solid #ff4433; color: #fff;
  box-shadow:
    inset 0 1px 3px rgba(0,0,0,0.35),
    0 0 8px rgba(255,40,0,0.45);
}

/* ── 4. RIGHT PPL LOGO ── */
.right-logo {
  flex: 0 0 var(--logo-w);
  height: 100%;
  display: flex; align-items: center; justify-content: center;
  padding: clamp(6px,0.8vh,12px);
  flex-shrink: 0;
  filter: drop-shadow(0 2px 6px rgba(0,0,0,0.5));
}
.right-logo img {
  height: 100%; max-height: clamp(38px,5.5vh,60px);
  width: auto; object-fit: contain;
}

/* ═══════════════════════════════════════════════
   PORTRAIT — stack into 2 rows, full width
═══════════════════════════════════════════════ */
@media (orientation: portrait) {
  :root { --bar-h: clamp(108px, 15vh, 140px); }

  #bar {
    flex-direction: column !important;
    align-items: stretch !important;
    height: var(--bar-h);
  }

  .logo-box,
  .right-logo { display: none; }

  .score-section {
    flex: 1 1 50% !important;
    min-width: 0 !important;
    border-radius: 0 !important;
    padding: 0 clamp(10px,3vw,22px) !important;
    border-bottom: 1px solid rgba(0,0,0,0.15);
  }

  .stats-section {
    flex: 1 1 50% !important;
    min-width: 0 !important;
    height: auto !important;
    align-self: stretch !important;
    border-radius: 0 !important;
    margin-left: 0 !important;
    padding: clamp(4px,1vh,8px) clamp(10px,3vw,22px) !important;
    flex-direction: row !important;
    align-items: center !important;
  }

  .team-vs   { font-size: clamp(10px,3vw,16px) !important; }
  .main-runs { font-size: clamp(16px,6.5vw,32px) !important; }
  .overs-val { font-size: clamp(10px,2.8vw,16px) !important; }
  .bat-pill  { font-size: clamp(7px,2vw,12px) !important; }
  .bat-score { font-size: clamp(8px,2.2vw,13px) !important; }
  .rr-val    { font-size: clamp(11px,3.5vw,18px) !important; }
  .bowl-name { font-size: clamp(9px,2.5vw,14px) !important; }
  .bowl-fig  { font-size: clamp(9px,2.3vw,13px) !important; }
  .ball      { width: clamp(12px,3.8vw,20px) !important; height: clamp(12px,3.8vw,20px) !important; }
}
</style>
</head>
<body>

<!-- ══ Sponsor ══ -->
<div id="sponsor">
  <div class="sponsor-box">
    <div class="sname">KM&amp;S Complex</div>
    <div class="stag">✦ Sponsored By ✦</div>
  </div>
</div>

<!-- ══ Watermark ══ -->
<div id="watermark">
  <img src="https://ppl2026-frontend.onrender.com/icons/icon-192.png" alt="PPL" onerror="this.style.display='none'">
  <div class="wm-text">
    <div class="wm-tag">Official</div>
    <div class="wm-name">PPL 2026</div>
  </div>
</div>

<!-- ══ No live ══ -->
<div id="no-live">
  <h2>⏳ Waiting for Live Match</h2>
  <p>Overlay activates when scoring begins</p>
</div>

<!-- ══ Alerts (UNCHANGED) ══ -->
<div class="alert" id="alert-six">
  <img class="alert-logo" src="https://ppl2026-frontend.onrender.com/icons/icon-192.png" alt="">
  <div class="alert-emoji">🚀</div>
  <div class="alert-word">SIX!</div>
  <div class="alert-player" id="six-player"></div>
  <div class="alert-ppl">PPL 2026</div>
</div>
<div class="alert" id="alert-four">
  <img class="alert-logo" src="https://ppl2026-frontend.onrender.com/icons/icon-192.png" alt="">
  <div class="alert-emoji">⚡</div>
  <div class="alert-word">FOUR!</div>
  <div class="alert-player" id="four-player"></div>
  <div class="alert-ppl">PPL 2026</div>
</div>
<div class="alert" id="alert-wicket">
  <img class="alert-logo" src="https://ppl2026-frontend.onrender.com/icons/icon-192.png" alt="">
  <div class="alert-emoji">💀</div>
  <div class="alert-word">WICKET!</div>
  <div class="alert-player" id="wkt-player"></div>
  <div class="alert-ppl">PPL 2026</div>
</div>

<!-- ══════════ SCOREBAR ══════════ -->
<div id="bar">

  <!-- 1. LEFT LOGO -->
  <div class="logo-box">
    <img src="https://ppl2026-frontend.onrender.com/icons/icon-192.png" alt="" onerror="this.style.display='none'">
  </div>

  <!-- 2. SCORE SECTION (green gradient) -->
  <div class="score-section">

    <!-- Top row: Team v Team | Score | Overs -->
    <div class="score-top">
      <div class="team-vs">
        <span id="t-field">FIELD</span>
        <span class="sep">v</span>
        <span id="t-bat">BAT</span>
      </div>
      <div class="main-runs" id="score">0-0</div>
      <div class="overs-val" id="overs">0.0</div>
      <div class="inn-badge" id="inn">1</div>
    </div>

    <!-- Bottom row: batter pills -->
    <div class="batsmen-row">
      <!-- Striker — navy pill, gold border, asterisk indicator -->
      <div class="bat-pill striker">
        <span class="bat-name" id="st-name">STRIKER</span><span class="bat-star">*</span>
        <span class="bat-score">
          <span id="st-runs">0</span><span class="bat-b" id="st-balls"> 0</span>
        </span>
      </div>
      <!-- Non-striker — navy pill, dim gold border -->
      <div class="bat-pill nstriker">
        <span class="bat-name" id="ns-name">NON-STR</span>
        <span class="bat-score">
          <span id="ns-runs">0</span><span class="bat-b" id="ns-balls"> 0</span>
        </span>
      </div>
    </div>

  </div><!-- /.score-section -->

  <!-- 3. STATS SECTION (navy, overlaps) -->
  <div class="stats-section">

    <!-- RR pill -->
    <div class="rr-block">
      <span class="rr-lbl" id="rr-lbl">RUN-RATE</span>
      <span class="rr-val" id="rr-val">0.00</span>
    </div>

    <!-- BOWLER PILL — contains name+figures on top, this-over balls below -->
    <div class="bowl-pill">
      <!-- Row 1: ball icon + bowler name + figures -->
      <div class="bowl-top-row">
        <div class="bowl-name-wrap">
          <div class="bowl-dot"></div>
          <span class="bowl-name" id="bowl-name">BOWLER</span>
        </div>
        <span class="bowl-fig" id="bowl-fig">0-0 <small>0.0</small></span>
      </div>
      <!-- Row 2: THIS OVER balls — strictly under bowler name -->
      <div class="bowl-over-row">
        <span class="over-lbl">THIS OVER</span>
        <div class="balls-row" id="over-balls"></div>
      </div>
    </div>

  </div><!-- /.stats-section -->

  <!-- 4. RIGHT PPL LOGO -->
  <div class="right-logo">
    <img src="https://ppl2026-frontend.onrender.com/icons/icon-192.png" alt="" onerror="this.style.display='none'">
  </div>

</div><!-- /#bar -->

<script>
const API = 'https://ppl2026-backend.onrender.com/api/live';
let prevLast = null, alertTimer = null, lastMatchId = null;

function firstName(n) {
  if (!n) return '—';
  return n.trim().split(/\s+/)[0].toUpperCase();
}
function fullName(n) { return n ? n.toUpperCase() : '???'; }

function ballCls(b) {
  if (b === 'W')            return 'b-wkt';
  if (b === '6')            return 'b-six';
  if (b === '4')            return 'b-four';
  if (b === 'Wd')           return 'b-wide';
  if (b === 'NB')           return 'b-nb';
  if (b === '•' || b === '0') return 'b-dot';
  return 'b-run';
}
function ballLbl(b) { return b === '•' ? '0' : b; }

function showAlert(id, line) {
  document.querySelectorAll('.alert').forEach(e => e.classList.remove('show'));
  if (alertTimer) clearTimeout(alertTimer);
  const el = document.getElementById(id);
  void el.offsetWidth;
  el.classList.add('show');
  const pid = id === 'alert-six' ? 'six-player' : id === 'alert-four' ? 'four-player' : 'wkt-player';
  document.getElementById(pid).textContent = line || '';
  alertTimer = setTimeout(() => el.classList.remove('show'), 3800);
}

function showBar(visible) {
  const bar = document.getElementById('bar');
  if (visible) {
    bar.style.display = 'flex';
    bar.classList.add('live');
  } else {
    bar.style.display = 'none';
    bar.classList.remove('live');
  }
  document.getElementById('no-live').style.display = visible ? 'none' : 'flex';
}

async function update() {
  try {
    const res  = await fetch(API, { cache: 'no-store' });
    const json = await res.json();
    const d    = json.data ?? json;

    if (!d || !d.matchId) {
      showBar(false);
      lastMatchId = null; prevLast = null;
      return;
    }

    showBar(true);
    if (d.matchId !== lastMatchId) { lastMatchId = d.matchId; prevLast = null; }

    /* Teams */
    const batting  = d.innings === 2 ? d.bowlingFirst : d.battingFirst;
    const fielding = d.innings === 2 ? d.battingFirst : d.bowlingFirst;
    document.getElementById('t-bat').textContent   = firstName(batting)   || fullName(batting);
    document.getElementById('t-field').textContent = firstName(fielding)  || fullName(fielding);

    /* Score & overs */
    document.getElementById('score').textContent = `${d.runs}-${d.wickets}`;
    document.getElementById('inn').textContent   = d.innings === 2 ? '2' : '1';
    const ov = Math.floor(d.balls / 6), bl = d.balls % 6;
    document.getElementById('overs').textContent = `${ov}.${bl}`;

    /* Run rate / required rate */
    const crr = d.balls > 0 ? (d.runs / (d.balls / 6)).toFixed(2) : '0.00';
    if (d.innings === 2 && d.target) {
      const needed = d.target - d.runs;
      const remB   = Math.max(0, (10 - ov) * 6 - bl);
      const rrr    = remB > 0 ? (needed / (remB / 6)).toFixed(2) : '—';
      document.getElementById('rr-lbl').textContent = 'REQUIRED';
      document.getElementById('rr-val').textContent = rrr;
    } else {
      document.getElementById('rr-lbl').textContent = 'RUN-RATE';
      document.getElementById('rr-val').textContent = crr;
    }

    /* Bowler */
    const b = d.currentBowler;
    if (b && b.name) {
      const bov = Math.floor((b.ballsBowled || 0) / 6), bbl = (b.ballsBowled || 0) % 6;
      document.getElementById('bowl-name').textContent = firstName(b.name);
      const fig = document.getElementById('bowl-fig');
      fig.innerHTML = `${b.wickets || 0}-${b.runsConceded || 0} <small>${bov}.${bbl}</small>`;
    }

    /* Batters */
    const st = d.striker;
    if (st && st.name) {
      document.getElementById('st-name').textContent  = firstName(st.name);
      document.getElementById('st-runs').textContent  = st.runs  || 0;
      document.getElementById('st-balls').textContent = ` ${st.balls || 0}`;
    }
    const ns = d.nonstriker;
    if (ns && ns.name) {
      document.getElementById('ns-name').textContent  = firstName(ns.name);
      document.getElementById('ns-runs').textContent  = ns.runs  || 0;
      document.getElementById('ns-balls').textContent = ` ${ns.balls || 0}`;
    }

    /* This over balls */
    const allBalls = d.lastBalls || [];
    const curBalls = allBalls.slice(ov * 6);
    const ballsDiv = document.getElementById('over-balls');
    ballsDiv.innerHTML = '';
    for (let i = 0; i < 7; i++) {
      const div = document.createElement('div');
      div.className = 'ball';
      if (i < curBalls.length) {
        div.classList.add(ballCls(curBalls[i]));
        div.textContent = ballLbl(curBalls[i]);
      } else {
        div.classList.add('b-empty');
      }
      ballsDiv.appendChild(div);
    }

    /* Alerts */
    const latest = allBalls[allBalls.length - 1];
    if (latest !== prevLast && prevLast !== null) {
      const stLine = st?.name ? `${st.name}  ${st.runs}(${st.balls})` : '';
      if (latest === '6')      showAlert('alert-six',    stLine);
      else if (latest === '4') showAlert('alert-four',   stLine);
      else if (latest === 'W') showAlert('alert-wicket', stLine);
    }
    prevLast = latest;

  } catch (e) { console.error('[PPL Overlay]', e); }
}

update();
setInterval(update, 1000);
</script>
</body>
</html>
