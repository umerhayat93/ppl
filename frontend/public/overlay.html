<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>PPL 2026 Live Overlay</title>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html,body{
  width:100%;height:100%;
  background:transparent;
  overflow:hidden;
  font-family:'Arial Narrow','Roboto Condensed',Arial,sans-serif;
  -webkit-font-smoothing:antialiased;
}

/* ══════════ CSS VARIABLES — one place to tune sizes ══════════ */
:root{
  --bar-h:   clamp(60px,10vh,88px);       /* total bar height */
  --side-w:  clamp(40px,5.4vw,66px);      /* logo column width */
  --bowl-w:  clamp(150px,19vw,250px);     /* bowler col = over col */
  --rr-w:    clamp(66px,8vw,108px);       /* run-rate column */
  --pill-pad:clamp(4px,0.6vh,8px) clamp(8px,1.1vw,16px);
  --pill-gap:clamp(5px,0.8vw,13px);
}
@media (orientation:portrait){
  :root{
    --bar-h:  clamp(72px,11vh,96px);
    --side-w: clamp(32px,8vw,52px);
    --bowl-w: clamp(110px,27vw,170px);
    --rr-w:   clamp(56px,13vw,86px);
    --pill-pad:clamp(3px,0.5vh,7px) clamp(5px,1.8vw,12px);
    --pill-gap:clamp(4px,1.2vw,10px);
  }
}

/* ══════════ SPONSOR — top right ══════════ */
#sponsor{position:fixed;top:1.5vh;right:1.2vw;z-index:100}
.sponsor-box{
  background:linear-gradient(135deg,rgba(0,50,110,0.92),rgba(0,25,70,0.95));
  border:1px solid rgba(135,206,250,0.38);
  border-radius:0.4vw;padding:0.35vh 0.9vw 0.3vh;
  text-align:center;position:relative;overflow:hidden;
  box-shadow:0 2px 14px rgba(0,100,255,0.2);
  animation:sPulse 4s ease-in-out infinite;
}
@keyframes sPulse{0%,100%{box-shadow:0 2px 14px rgba(0,100,255,0.2)}50%{box-shadow:0 2px 22px rgba(0,160,255,0.4)}}
.sponsor-box::after{
  content:'';position:absolute;top:0;left:-60%;width:35%;height:100%;
  background:linear-gradient(90deg,transparent,rgba(255,255,255,0.07),transparent);
  animation:shimmer 4.5s ease-in-out infinite;
}
@keyframes shimmer{0%{left:-60%}100%{left:140%}}
.sname{font-family:'Arial Black',Arial,sans-serif;font-size:clamp(8px,1.1vw,14px);font-weight:900;color:#87CEFA;letter-spacing:0.1vw;text-transform:uppercase;position:relative;z-index:1}
.stag{font-size:clamp(5px,0.5vw,7px);color:rgba(200,230,255,0.55);letter-spacing:0.18vw;text-transform:uppercase;margin-top:0.08vh;position:relative;z-index:1}

/* ══════════ WATERMARK — top left ══════════ */
#watermark{position:fixed;top:1.4vh;left:1.2vw;display:flex;align-items:center;gap:0.55vw;z-index:50;filter:drop-shadow(0 2px 8px rgba(0,0,0,0.8))}
#watermark img{width:clamp(30px,4vw,52px);height:clamp(30px,4vw,52px);object-fit:contain;border-radius:0.4vw}
.wm-tag{font-size:clamp(5px,0.55vw,8px);color:#87CEFA;font-weight:700;letter-spacing:0.2vw;text-transform:uppercase;line-height:1}
.wm-name{font-family:'Arial Black',Arial,sans-serif;font-size:clamp(10px,1.45vw,20px);font-weight:900;color:#fff;line-height:1}

/* ══════════ NO LIVE SCREEN ══════════ */
#no-live{
  position:fixed;inset:0;background:rgba(0,8,25,0.93);
  display:flex;align-items:center;justify-content:center;
  flex-direction:column;gap:1.6vh;z-index:200;
}
#no-live h2{font-size:clamp(12px,1.8vw,26px);color:rgba(135,206,250,0.42);font-weight:900;letter-spacing:0.35vw;text-transform:uppercase}
#no-live p{font-size:clamp(7px,0.8vw,11px);color:rgba(135,206,250,0.22);letter-spacing:0.18vw}

/* ══════════ CIRCULAR ALERTS ══════════ */
.alert{
  position:fixed;top:40%;left:50%;
  transform:translate(-50%,-50%) scale(0);
  width:clamp(150px,24vw,300px);height:clamp(150px,24vw,300px);
  border-radius:50%;display:flex;flex-direction:column;
  align-items:center;justify-content:center;
  z-index:999;pointer-events:none;gap:0.18vw;backdrop-filter:blur(6px);
}
.alert.show{animation:aSpring 3.8s cubic-bezier(.34,1.56,.64,1) forwards}
@keyframes aSpring{
  0%  {transform:translate(-50%,-50%) scale(0);opacity:0}
  9%  {transform:translate(-50%,-50%) scale(1.1);opacity:1}
  16% {transform:translate(-50%,-50%) scale(0.95)}
  22% {transform:translate(-50%,-50%) scale(1.03)}
  28% {transform:translate(-50%,-50%) scale(1);opacity:1}
  76% {transform:translate(-50%,-50%) scale(1);opacity:1}
  100%{transform:translate(-50%,-50%) scale(0.7);opacity:0}
}
#alert-six   {background:radial-gradient(circle at 40% 40%,rgba(0,70,15,0.93),rgba(0,25,5,0.97) 70%);border:clamp(2px,0.28vw,4px) solid rgba(0,220,65,0.8);box-shadow:0 0 clamp(18px,4vw,65px) rgba(0,200,55,0.45)}
#alert-four  {background:radial-gradient(circle at 40% 40%,rgba(0,18,95,0.93),rgba(0,6,38,0.97) 70%);border:clamp(2px,0.28vw,4px) solid rgba(55,135,255,0.85);box-shadow:0 0 clamp(18px,4vw,65px) rgba(35,115,255,0.45)}
#alert-wicket{background:radial-gradient(circle at 40% 40%,rgba(95,0,0,0.93),rgba(38,0,0,0.97) 70%);border:clamp(2px,0.28vw,4px) solid rgba(255,45,15,0.85);box-shadow:0 0 clamp(18px,4vw,65px) rgba(255,35,0,0.45)}
.alert-logo  {width:clamp(24px,4vw,55px);height:clamp(24px,4vw,55px);object-fit:contain;border-radius:0.6vw;filter:drop-shadow(0 0 0.5vw rgba(255,255,255,0.4))}
.alert-word  {font-family:'Arial Black',Arial,sans-serif;font-size:clamp(20px,4.4vw,62px);font-weight:900;text-transform:uppercase;line-height:1;animation:aGlow 0.5s ease infinite alternate}
@keyframes aGlow{from{filter:brightness(1)}to{filter:brightness(1.55) drop-shadow(0 0 0.5vw currentColor)}}
#alert-six    .alert-word{color:#00ff58}
#alert-four   .alert-word{color:#4aabff}
#alert-wicket .alert-word{color:#ff5533}
.alert-emoji {font-size:clamp(13px,2.4vw,34px);line-height:1}
.alert-player{font-size:clamp(6px,0.85vw,11px);color:rgba(220,240,255,0.82);font-weight:700;letter-spacing:0.08vw;text-align:center;max-width:86%;line-height:1.3}
.alert-ppl   {font-family:'Arial Black',Arial,sans-serif;font-size:clamp(5px,0.65vw,9px);font-weight:900;letter-spacing:0.42vw;text-transform:uppercase;opacity:0.5;margin-top:0.1vw}
#alert-six    .alert-ppl{color:#88ffaa}
#alert-four   .alert-ppl{color:#88ccff}
#alert-wicket .alert-ppl{color:#ffaa88}

/* ══════════════════════════════════════════════════════
   SCOREBAR — professional 2-row bar, full-width, aligned
══════════════════════════════════════════════════════ */
#bar{
  position:fixed;bottom:0;left:0;right:0;
  height:var(--bar-h);
  display:none;flex-direction:column;
}

/* ─── Shared background layer ─── */
#bar::before{
  content:'';position:absolute;inset:0;
  background:linear-gradient(180deg,rgba(0,28,80,0.97) 0%,rgba(0,16,55,0.99) 100%);
  z-index:0;
}

/* ─── ROW 1 ─── */
.r1{
  position:relative;z-index:1;
  flex:0 0 56%;
  display:flex;align-items:stretch;
  overflow:visible;
}

/* ── Left logo ── */
.left-logo{
  flex:0 0 var(--side-w);
  background:linear-gradient(145deg,#004499,#002266);
  display:flex;align-items:center;justify-content:center;
  clip-path:polygon(0 0,76% 0,100% 100%,0 100%);
  padding-right:0.8vw;z-index:3;flex-shrink:0;
}
.left-logo img{width:clamp(22px,3vw,42px);height:clamp(22px,3vw,42px);object-fit:contain;border-radius:0.3vw}

/* ── GREEN PILL — rises above row 1 ── */
.pill-wrap{flex:0 0 auto;display:flex;align-items:flex-end;z-index:10;position:relative}
.pill{
  margin-top:clamp(-16px,-2.5vh,-6px);
  background:linear-gradient(170deg,#caf200 0%,#aedd00 55%,#99cc00 100%);
  border-radius:clamp(4px,0.55vw,9px) clamp(4px,0.55vw,9px) 0 0;
  border:1.5px solid rgba(0,0,0,0.12);
  border-bottom:none;
  display:flex;align-items:center;
  padding:var(--pill-pad);
  gap:var(--pill-gap);
  box-shadow:0 -4px 20px rgba(0,0,0,0.35),0 -1px 6px rgba(160,240,0,0.2),inset 0 1px 0 rgba(255,255,255,0.32);
}

/* Pill sections with styled separators */
.teams-block{
  display:flex;align-items:center;
  gap:clamp(3px,0.45vw,7px);
  flex-shrink:1;
  min-width:0;
}
.t-name{
  font-size:clamp(9px,1.2vw,17px);
  font-weight:900;color:#0e1a00;
  text-transform:uppercase;white-space:nowrap;
  letter-spacing:0.02vw;line-height:1;
  overflow:hidden;text-overflow:ellipsis;
  max-width:clamp(60px,10vw,150px);
}
@media (orientation:portrait){
  .t-name{max-width:clamp(45px,14vw,100px);font-size:clamp(8px,2.4vw,14px) !important}
}
.vs-badge{
  flex-shrink:0;
  background:rgba(0,0,0,0.16);
  color:#3a5000;
  font-size:clamp(6px,0.7vw,10px);
  font-weight:700;
  padding:0.1em 0.45em;
  border-radius:3px;
  letter-spacing:0.05vw;
  text-transform:uppercase;
  line-height:1.4;
}

/* Vertical divider inside pill */
.pill-sep{
  width:1.5px;
  height:clamp(18px,2.5vh,34px);
  background:rgba(0,0,0,0.18);
  border-radius:1px;
  flex-shrink:0;
  align-self:center;
}

/* Score block */
.score-block{
  display:flex;align-items:baseline;
  gap:clamp(1px,0.15vw,3px);
  flex-shrink:0;
}
.score-big{
  font-family:'Arial Black',Arial,sans-serif;
  font-size:clamp(18px,3.2vw,46px);
  font-weight:900;color:#000;
  letter-spacing:-0.03vw;line-height:1;white-space:nowrap;
}

/* Overs + innings */
.overs-box{
  display:flex;flex-direction:column;
  align-items:center;justify-content:center;
  line-height:1;flex-shrink:0;
}
.ov-num{font-size:clamp(10px,1.4vw,19px);font-weight:900;color:#0e1a00;line-height:1}
.ov-lbl{font-size:clamp(4px,0.42vw,6px);color:#3a5000;text-transform:uppercase;letter-spacing:0.08vw}
.inn-dot{
  width:clamp(12px,1.45vw,19px);height:clamp(12px,1.45vw,19px);
  border-radius:50%;background:rgba(0,0,0,0.22);border:1.5px solid rgba(0,0,0,0.32);
  display:flex;align-items:center;justify-content:center;
  font-size:clamp(6px,0.72vw,10px);font-weight:900;color:#fff;flex-shrink:0;
}

/* ── RIGHT BLOCK — RR + BOWLER ── */
.right-blk{
  flex:1;
  display:flex;align-items:stretch;
  overflow:hidden;
  border-left:1px solid rgba(135,206,250,0.08);
}

/* RUN RATE — distinct yellow-tinted pill */
.rr-blk{
  flex:0 0 var(--rr-w);
  display:flex;flex-direction:column;
  justify-content:center;align-items:center;
  padding:0 clamp(6px,0.9vw,13px);
  background:linear-gradient(135deg,rgba(255,200,0,0.14),rgba(255,170,0,0.08));
  border-right:1px solid rgba(255,215,0,0.28);
  border-left:1px solid rgba(255,215,0,0.15);
  flex-shrink:0;
  gap:clamp(1px,0.2vh,3px);
}
.rr-lbl{
  font-size:clamp(5px,0.55vw,7.5px);
  font-weight:700;
  color:rgba(255,225,80,0.75);
  text-transform:uppercase;
  letter-spacing:0.14vw;
  white-space:nowrap;
  line-height:1;
}
.rr-num{
  font-family:'Arial Black',Arial,sans-serif;
  font-size:clamp(13px,1.7vw,22px);
  font-weight:900;color:#FFD700;
  line-height:1;
  text-shadow:0 0 12px rgba(255,215,0,0.5);
}

/* BOWLER — fixed width so over-section below aligns */
.bowl-blk{
  flex:0 0 var(--bowl-w);
  display:flex;flex-direction:column;
  justify-content:center;align-items:flex-start;
  padding:clamp(2px,0.3vh,5px) clamp(7px,1vw,14px);
  border-left:1px solid rgba(135,206,250,0.12);
  gap:clamp(1px,0.15vh,3px);
  overflow:hidden;
  flex-shrink:0;
}
.bowl-row{display:flex;align-items:center;gap:clamp(3px,0.4vw,6px)}
.ball-ico{
  width:clamp(8px,1.1vw,14px);height:clamp(8px,1.1vw,14px);
  border-radius:50%;flex-shrink:0;
  background:radial-gradient(circle at 33% 33%,#dd2200,#880000);
  border:1px solid rgba(255,70,40,0.5);
  box-shadow:0 0 4px rgba(220,40,0,0.35);
}
.bowl-name{font-size:clamp(9px,1.05vw,14px);font-weight:900;color:#fff;text-transform:uppercase;letter-spacing:0.03vw;white-space:nowrap}
.bowl-fig{font-size:clamp(5px,0.58vw,8px);font-weight:600;color:rgba(190,220,255,0.6);white-space:nowrap}

/* Flex spacer in right-blk to push bowl to right edge properly */
.right-spacer{flex:1}

/* ── Right logo ── */
.rt-logo{
  flex:0 0 var(--side-w);flex-shrink:0;
  background:linear-gradient(135deg,#003c8a,#001f50);
  display:flex;align-items:center;justify-content:center;
  clip-path:polygon(18% 0,100% 0,100% 100%,0 100%);
  padding-left:0.8vw;
}
.rt-logo img{width:clamp(22px,3vw,42px);height:clamp(22px,3vw,42px);object-fit:contain;border-radius:0.3vw}

/* ─── ROW 2 — batters + THIS OVER aligned under bowler ─── */
.r2{
  position:relative;z-index:1;
  flex:1;
  display:flex;align-items:stretch;
  border-top:1px solid rgba(135,206,250,0.1);
}

/* Spacer matching left-logo */
.r2-left{
  flex:0 0 var(--side-w);flex-shrink:0;
  background:linear-gradient(180deg,rgba(0,28,90,0.9),rgba(0,18,65,0.95));
}

/* Batter area — flex:1, aligns with pill + rr */
.bat-area{
  flex:1;
  display:flex;align-items:center;
  padding:0 clamp(5px,0.7vw,11px);
  gap:clamp(4px,0.55vw,10px);
  background:rgba(0,18,58,0.55);
  overflow:hidden;
}

/* Batter cards with strong contrast */
.bat-card{
  display:flex;align-items:center;
  gap:clamp(3px,0.38vw,6px);
  padding:clamp(2px,0.28vh,5px) clamp(6px,0.85vw,13px);
  border-radius:clamp(3px,0.38vw,5px);
  white-space:nowrap;flex-shrink:0;
}
.bat-card.striker-card{
  background:linear-gradient(135deg,rgba(180,140,0,0.38),rgba(255,210,0,0.22));
  border:1.5px solid rgba(255,205,0,0.65);
  box-shadow:0 0 10px rgba(255,195,0,0.16);
}
.bat-card.nonstriker-card{
  background:linear-gradient(135deg,rgba(0,55,150,0.52),rgba(0,38,110,0.42));
  border:1.5px solid rgba(70,150,255,0.42);
  box-shadow:0 0 8px rgba(25,100,255,0.13);
}
.bat-slash-icon{font-size:clamp(8px,0.95vw,13px);color:rgba(255,215,50,0.75);font-weight:700}
.bat-icon{font-size:clamp(7px,0.8vw,11px);opacity:0.68;flex-shrink:0}
.bat-n{font-size:clamp(8px,1vw,14px);font-weight:900;text-transform:uppercase;letter-spacing:0.02vw;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:clamp(50px,9vw,130px)}
.bat-n.sn{color:#FFE000;text-shadow:0 0 5px rgba(255,220,0,0.45)}
.bat-n.nn{color:rgba(175,210,255,0.82)}
.bat-star{font-size:clamp(8px,1vw,14px);color:#FFE000;font-weight:900}
.bat-r{font-family:'Arial Black',Arial,sans-serif;font-size:clamp(13px,1.55vw,21px);font-weight:900}
.bat-r.sr{color:#fff}
.bat-r.nr{color:rgba(175,210,255,0.72)}
.bat-b{font-size:clamp(6px,0.72vw,10px)}
.bat-b.sb{color:rgba(255,255,255,0.46)}
.bat-b.nb{color:rgba(125,165,215,0.46)}
.bat-divider{color:rgba(135,206,250,0.14);font-size:clamp(13px,1.6vw,22px);padding:0 clamp(1px,0.18vw,4px);align-self:center;flex-shrink:0}

/* THIS OVER section — same fixed width as bowl-blk → sits directly under it */
.over-section{
  flex:0 0 var(--bowl-w);flex-shrink:0;
  display:flex;align-items:center;
  gap:clamp(4px,0.55vw,9px);
  padding:0 clamp(7px,1vw,14px);
  background:rgba(0,20,60,0.62);
  border-left:1px solid rgba(135,206,250,0.12);
  overflow:hidden;
}
.over-lbl{
  font-size:clamp(5px,0.52vw,7px);
  font-weight:700;
  color:rgba(190,220,255,0.42);
  text-transform:uppercase;
  letter-spacing:0.1vw;
  white-space:nowrap;
  flex-shrink:0;
}
.over-balls{display:flex;gap:clamp(2px,0.35vw,5px);align-items:center;flex-wrap:nowrap}

/* Spacer matching rt-logo in row 2 */
.r2-right{
  flex:0 0 var(--side-w);flex-shrink:0;
  background:rgba(0,12,42,0.7);
}

/* ── Ball dots ── */
.oball{
  width:clamp(12px,1.7vw,22px);height:clamp(12px,1.7vw,22px);
  border-radius:50%;
  display:flex;align-items:center;justify-content:center;
  font-size:clamp(5px,0.7vw,9.5px);font-weight:900;flex-shrink:0;
  box-shadow:inset 0 1px 3px rgba(0,0,0,0.28),0 1px 2px rgba(0,0,0,0.18);
}
.ob-empty{background:rgba(255,255,255,0.04);border:1.5px solid rgba(135,206,250,0.17)}
.ob-dot  {background:rgba(85,95,115,0.65);border:1.5px solid rgba(135,145,170,0.36);color:rgba(255,255,255,0.65)}
.ob-run  {background:#1a5810;border:1.5px solid #3a9828;color:#fff}
.ob-four {background:#0035aa;border:1.5px solid #4080ff;color:#fff}
.ob-six  {background:#aa3e00;border:1.5px solid #ff8022;color:#fff}
.ob-wide {background:rgba(90,70,0,0.78);border:1.5px solid #886600;color:#ffe000;font-size:clamp(4px,0.46vw,6.5px)}
.ob-nb   {background:rgba(90,70,0,0.78);border:1.5px solid #886600;color:#ffe000;font-size:clamp(4px,0.44vw,6px)}
.ob-wkt  {background:#990000;border:1.5px solid #ff3322;color:#fff;box-shadow:inset 0 1px 3px rgba(0,0,0,0.3),0 0 5px rgba(255,35,0,0.3)}

/* ══════════ PORTRAIT FINE-TUNE ══════════ */
@media (orientation:portrait){
  .ov-num  {font-size:clamp(10px,2.2vw,17px) !important}
  .score-big{font-size:clamp(16px,4.8vw,36px) !important}
  .rr-num  {font-size:clamp(11px,2.6vw,19px) !important}
  .bowl-name{font-size:clamp(8px,1.8vw,13px) !important}
  .bat-r   {font-size:clamp(12px,2.8vw,19px) !important}
  .bat-n   {font-size:clamp(8px,1.9vw,13px) !important}
  .oball   {width:clamp(11px,2.8vw,18px) !important;height:clamp(11px,2.8vw,18px) !important}
  .pill-sep{height:clamp(14px,2vh,26px) !important}
}
</style>
</head>
<body>

<!-- Sponsor -->
<div id="sponsor">
  <div class="sponsor-box">
    <div class="sname">KM&amp;S Complex</div>
    <div class="stag">✦ Sponsored By ✦</div>
  </div>
</div>

<!-- Watermark -->
<div id="watermark">
  <img src="https://ppl2026-frontend.onrender.com/icons/icon-192.png" alt="PPL" onerror="this.style.display='none'">
  <div class="wm-text">
    <div class="wm-tag">Official</div>
    <div class="wm-name">PPL 2026</div>
  </div>
</div>

<!-- No live -->
<div id="no-live">
  <h2>⏳ Waiting for Live Match</h2>
  <p>Overlay activates when scoring begins</p>
</div>

<!-- Alerts -->
<div class="alert" id="alert-six">
  <img class="alert-logo" src="https://ppl2026-frontend.onrender.com/icons/icon-192.png" alt="">
  <div class="alert-emoji">🚀</div>
  <div class="alert-word">SIX!</div>
  <div class="alert-player" id="six-player"></div>
  <div class="alert-ppl">PPL 2026</div>
</div>
<div class="alert" id="alert-four">
  <img class="alert-logo" src="https://ppl2026-frontend.onrender.com/icons/icon-192.png" alt="">
  <div class="alert-emoji">⚡</div>
  <div class="alert-word">FOUR!</div>
  <div class="alert-player" id="four-player"></div>
  <div class="alert-ppl">PPL 2026</div>
</div>
<div class="alert" id="alert-wicket">
  <img class="alert-logo" src="https://ppl2026-frontend.onrender.com/icons/icon-192.png" alt="">
  <div class="alert-emoji">💀</div>
  <div class="alert-word">WICKET!</div>
  <div class="alert-player" id="wkt-player"></div>
  <div class="alert-ppl">PPL 2026</div>
</div>

<!-- ═══════════════ SCOREBAR ═══════════════ -->
<div id="bar">

  <!-- ── ROW 1: logo | pill | RR | BOWLER | rt-logo ── -->
  <div class="r1">

    <div class="left-logo">
      <img src="https://ppl2026-frontend.onrender.com/icons/icon-192.png" alt="" onerror="this.style.display='none'">
    </div>

    <!-- PILL: team names ◆ score ◆ overs -->
    <div class="pill-wrap">
      <div class="pill">
        <div class="teams-block">
          <span class="t-name" id="t-field">FLD</span>
          <span class="vs-badge">v</span>
          <span class="t-name" id="t-bat">BAT</span>
        </div>
        <div class="pill-sep"></div>
        <div class="score-block">
          <span class="score-big" id="score">0-0</span>
        </div>
        <div class="pill-sep"></div>
        <div class="overs-box">
          <span class="ov-num" id="overs">0.0</span>
          <span class="ov-lbl">Overs</span>
        </div>
        <div class="inn-dot" id="inn">1</div>
      </div>
    </div>

    <!-- RIGHT: run rate | bowler -->
    <div class="right-blk">
      <div class="right-spacer"></div>

      <!-- RUN RATE — yellow-tinted, spaced, distinct -->
      <div class="rr-blk">
        <span class="rr-lbl" id="rr-lbl">RUN RATE</span>
        <span class="rr-num" id="rr-num">0.00</span>
      </div>

      <!-- BOWLER — fixed width matching over-section below -->
      <div class="bowl-blk">
        <div class="bowl-row">
          <div class="ball-ico"></div>
          <span class="bowl-name" id="bowl-name">BOWLER</span>
        </div>
        <span class="bowl-fig" id="bowl-fig">0.0 · 0R · 0W</span>
      </div>

    </div><!-- /.right-blk -->

    <div class="rt-logo">
      <img src="https://ppl2026-frontend.onrender.com/icons/icon-192.png" alt="" onerror="this.style.display='none'">
    </div>

  </div><!-- /.r1 -->

  <!-- ── ROW 2: r2-left | batters | THIS OVER (under bowler) | r2-right ── -->
  <div class="r2">

    <div class="r2-left"></div>

    <!-- BATTERS -->
    <div class="bat-area">
      <div class="bat-card striker-card">
        <span class="bat-slash-icon">/</span>
        <span class="bat-icon">🏏</span>
        <span class="bat-n sn" id="st-name">STRIKER</span>
        <span class="bat-star">*</span>
        <span class="bat-r sr" id="st-runs">0</span>
        <span class="bat-b sb" id="st-balls">(0)</span>
      </div>

      <span class="bat-divider">|</span>

      <div class="bat-card nonstriker-card">
        <span class="bat-icon">🏏</span>
        <span class="bat-n nn" id="ns-name">NON-STR</span>
        <span class="bat-r nr" id="ns-runs">0</span>
        <span class="bat-b nb" id="ns-balls">(0)</span>
      </div>
    </div>

    <!-- THIS OVER — same width as bowl-blk → visually under bowler -->
    <div class="over-section">
      <span class="over-lbl">THIS OVER</span>
      <div class="over-balls" id="over-balls"></div>
    </div>

    <div class="r2-right"></div>

  </div><!-- /.r2 -->

</div><!-- /#bar -->

<script>
const API='https://ppl2026-backend.onrender.com/api/live';
let prevLast=null,alertTimer=null,lastMatchId=null;

function firstName(n){if(!n)return'—';return n.trim().split(/\s+/)[0].toUpperCase()}
function fullName(n){if(!n)return'???';return n.trim().toUpperCase()}

function ballCls(b){
  if(b==='W')return'ob-wkt';
  if(b==='6')return'ob-six';
  if(b==='4')return'ob-four';
  if(b==='Wd')return'ob-wide';
  if(b==='NB')return'ob-nb';
  if(b==='•'||b==='0')return'ob-dot';
  return'ob-run';
}
function ballLbl(b){return b==='•'?'0':b}

function showAlert(id,line){
  document.querySelectorAll('.alert').forEach(e=>e.classList.remove('show'));
  if(alertTimer)clearTimeout(alertTimer);
  const el=document.getElementById(id);
  void el.offsetWidth;
  el.classList.add('show');
  const pid=id==='alert-six'?'six-player':id==='alert-four'?'four-player':'wkt-player';
  document.getElementById(pid).textContent=line||'';
  alertTimer=setTimeout(()=>el.classList.remove('show'),3800);
}

async function update(){
  try{
    const res=await fetch(API,{cache:'no-store'});
    const json=await res.json();
    const d=json.data??json;

    if(!d||!d.matchId){
      document.getElementById('bar').style.display='none';
      document.getElementById('no-live').style.display='flex';
      lastMatchId=null;prevLast=null;return;
    }
    document.getElementById('bar').style.display='flex';
    document.getElementById('no-live').style.display='none';
    if(d.matchId!==lastMatchId){lastMatchId=d.matchId;prevLast=null}

    const batting =d.innings===2?d.bowlingFirst:d.battingFirst;
    const fielding=d.innings===2?d.battingFirst:d.bowlingFirst;
    document.getElementById('t-bat').textContent=fullName(batting);
    document.getElementById('t-field').textContent=fullName(fielding);
    document.getElementById('score').textContent=`${d.runs}-${d.wickets}`;
    document.getElementById('inn').textContent=d.innings===2?'2':'1';

    const ov=Math.floor(d.balls/6),bl=d.balls%6;
    document.getElementById('overs').textContent=`${ov}.${bl}`;

    const crr=d.balls>0?(d.runs/(d.balls/6)).toFixed(2):'0.00';
    if(d.innings===2&&d.target){
      const needed=d.target-d.runs;
      const remB=Math.max(0,(10-ov)*6-bl);
      const rrr=remB>0?(needed/(remB/6)).toFixed(2):'—';
      document.getElementById('rr-lbl').textContent='REQUIRED';
      document.getElementById('rr-num').textContent=rrr;
    }else{
      document.getElementById('rr-lbl').textContent='RUN RATE';
      document.getElementById('rr-num').textContent=crr;
    }

    const b=d.currentBowler;
    if(b&&b.name){
      const bov=Math.floor((b.ballsBowled||0)/6),bbl=(b.ballsBowled||0)%6;
      document.getElementById('bowl-name').textContent=firstName(b.name);
      document.getElementById('bowl-fig').textContent=`${bov}.${bbl} · ${b.runsConceded||0}R · ${b.wickets||0}W`;
    }

    const st=d.striker;
    if(st&&st.name){
      document.getElementById('st-name').textContent=st.name.toUpperCase();
      document.getElementById('st-runs').textContent=st.runs||0;
      document.getElementById('st-balls').textContent=`(${st.balls||0})`;
    }
    const ns=d.nonstriker;
    if(ns&&ns.name){
      document.getElementById('ns-name').textContent=ns.name.toUpperCase();
      document.getElementById('ns-runs').textContent=ns.runs||0;
      document.getElementById('ns-balls').textContent=`(${ns.balls||0})`;
    }

    const allBalls=d.lastBalls||[];
    const curBalls=allBalls.slice(ov*6);
    const ballsDiv=document.getElementById('over-balls');
    ballsDiv.innerHTML='';
    for(let i=0;i<7;i++){
      const div=document.createElement('div');
      div.className='oball';
      if(i<curBalls.length){
        div.classList.add(ballCls(curBalls[i]));
        div.textContent=ballLbl(curBalls[i]);
      }else{
        div.classList.add('ob-empty');
      }
      ballsDiv.appendChild(div);
    }

    const latest=allBalls[allBalls.length-1];
    if(latest!==prevLast&&prevLast!==null){
      const stLine=st?.name?`${st.name}  ${st.runs}(${st.balls})`:'';
      if(latest==='6')showAlert('alert-six',stLine);
      else if(latest==='4')showAlert('alert-four',stLine);
      else if(latest==='W')showAlert('alert-wicket',stLine);
    }
    prevLast=latest;
  }catch(e){console.error('[PPL Overlay]',e)}
}
update();
setInterval(update,1000);
</script>
</body>
</html>
