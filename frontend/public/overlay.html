<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>PPL 2026 — Premium Overlay</title>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html,body{
  width:100%;height:100%;background:transparent;
  overflow:hidden;
  font-family:'Arial Narrow','Roboto Condensed',Arial,sans-serif;
  -webkit-font-smoothing:antialiased;
}

/* ══════════════════════════════════════
   DESIGN TOKENS
══════════════════════════════════════ */
:root{
  /* layout */
  --bh:   clamp(58px, 10vh, 88px);
  --r1:   56%;
  --sw:   clamp(46px, 6vw, 74px);
  --rw:   clamp(205px, 27vw, 330px);
  --rise: clamp(11px, 1.9vh, 17px);

  /* colour */
  --gold:       #f5c518;
  --gold-glow:  rgba(245,197,24,.22);
  --gold-tint:  rgba(245,197,24,.1);
  --gold-border:rgba(245,197,24,.38);
  --blue:       #4da6ff;
  --blue-tint:  rgba(77,166,255,.1);
  --blue-border:rgba(77,166,255,.35);
  --bar:        rgba(5,9,24,.97);
  --surface:    rgba(255,255,255,.042);
  --border:     rgba(255,255,255,.07);
  --muted:      rgba(185,210,255,.5);
}

@media (orientation:portrait){
  :root{
    --bh:  clamp(70px,10.5vh,94px);
    --sw:  clamp(34px,8.5vw,54px);
    --rw:  clamp(140px,37vw,205px);
    --rise:clamp(8px,1.4vh,12px);
  }
}

/* ══════════════════════════════════════
   SPONSOR — top right
══════════════════════════════════════ */
#sponsor{position:fixed;top:1.5vh;right:1.2vw;z-index:100}
.sponsor-box{
  background:rgba(6,10,28,.94);
  border:1px solid var(--gold-border);
  border-radius:6px;
  padding:.36vh .95vw .3vh;
  text-align:center;
  position:relative;overflow:hidden;
  box-shadow:0 0 18px var(--gold-glow),0 2px 14px rgba(0,0,0,.45);
}
/* Gold shimmer top line */
.sponsor-box::before{
  content:'';position:absolute;
  top:0;left:0;right:0;height:1.5px;
  background:linear-gradient(90deg,transparent,var(--gold) 40%,var(--gold) 60%,transparent);
  opacity:.75;
}
/* Sweep shimmer */
.sponsor-box::after{
  content:'';position:absolute;
  top:0;left:-70%;width:40%;height:100%;
  background:linear-gradient(90deg,transparent,rgba(255,255,255,.06),transparent);
  animation:sweep 5s ease-in-out infinite;
}
@keyframes sweep{0%{left:-70%}100%{left:130%}}
.sname{
  font-family:'Arial Black',Arial,sans-serif;
  font-size:clamp(8px,1.12vw,15px);
  font-weight:900;color:#fff;
  letter-spacing:.09vw;text-transform:uppercase;
  position:relative;z-index:1;
  text-shadow:0 1px 5px rgba(0,0,0,.6);
}
.stag{
  font-size:clamp(5px,.5vw,7px);
  color:rgba(245,197,24,.65);
  letter-spacing:.2vw;text-transform:uppercase;
  margin-top:.07vh;position:relative;z-index:1;
}

/* ══════════════════════════════════════
   WATERMARK — top left
══════════════════════════════════════ */
#watermark{
  position:fixed;top:1.4vh;left:1.2vw;
  display:flex;align-items:center;gap:.52vw;
  z-index:50;filter:drop-shadow(0 2px 10px rgba(0,0,0,.85));
}
#watermark img{width:clamp(26px,3.6vw,50px);height:clamp(26px,3.6vw,50px);object-fit:contain;border-radius:.4vw}
.wm-tag{font-size:clamp(5px,.5vw,7px);color:rgba(245,197,24,.65);font-weight:700;letter-spacing:.2vw;text-transform:uppercase;line-height:1}
.wm-name{font-family:'Arial Black',Arial,sans-serif;font-size:clamp(9px,1.38vw,19px);font-weight:900;color:#fff;line-height:1}

/* ══════════════════════════════════════
   NO LIVE
══════════════════════════════════════ */
#no-live{
  position:fixed;inset:0;background:rgba(2,5,16,.96);
  display:flex;align-items:center;justify-content:center;
  flex-direction:column;gap:1.6vh;z-index:200;
}
#no-live h2{font-size:clamp(12px,1.8vw,26px);color:rgba(245,197,24,.3);font-weight:900;letter-spacing:.4vw;text-transform:uppercase}
#no-live p{font-size:clamp(7px,.8vw,11px);color:rgba(200,220,255,.18);letter-spacing:.2vw}

/* ══════════════════════════════════════
   CIRCULAR ALERTS
══════════════════════════════════════ */
.alert{
  position:fixed;top:40%;left:50%;
  transform:translate(-50%,-50%) scale(0);
  width:clamp(155px,25vw,315px);height:clamp(155px,25vw,315px);
  border-radius:50%;
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  z-index:999;pointer-events:none;gap:.2vw;
  backdrop-filter:blur(10px);
}
.alert.show{animation:aSpring 3.8s cubic-bezier(.34,1.56,.64,1) forwards}
@keyframes aSpring{
  0%  {transform:translate(-50%,-50%) scale(0);opacity:0}
  9%  {transform:translate(-50%,-50%) scale(1.12);opacity:1}
  16% {transform:translate(-50%,-50%) scale(.94)}
  22% {transform:translate(-50%,-50%) scale(1.04)}
  28% {transform:translate(-50%,-50%) scale(1);opacity:1}
  76% {transform:translate(-50%,-50%) scale(1);opacity:1}
  100%{transform:translate(-50%,-50%) scale(.7);opacity:0}
}
#alert-six   {background:radial-gradient(circle at 38% 38%,rgba(0,65,15,.95),rgba(0,20,5,.98) 72%);border:clamp(2px,.3vw,4px) solid rgba(0,220,65,.85);box-shadow:0 0 clamp(18px,4vw,68px) rgba(0,200,55,.5)}
#alert-four  {background:radial-gradient(circle at 38% 38%,rgba(0,18,95,.95),rgba(0,5,36,.98) 72%);border:clamp(2px,.3vw,4px) solid rgba(55,135,255,.88);box-shadow:0 0 clamp(18px,4vw,68px) rgba(35,115,255,.5)}
#alert-wicket{background:radial-gradient(circle at 38% 38%,rgba(92,0,0,.95),rgba(36,0,0,.98) 72%);border:clamp(2px,.3vw,4px) solid rgba(255,45,15,.88);box-shadow:0 0 clamp(18px,4vw,68px) rgba(255,35,0,.5)}
.alert-logo  {width:clamp(24px,4vw,56px);height:clamp(24px,4vw,56px);object-fit:contain;border-radius:.6vw;filter:drop-shadow(0 0 .5vw rgba(255,255,255,.45))}
.alert-word  {font-family:'Arial Black',Arial,sans-serif;font-size:clamp(20px,4.5vw,64px);font-weight:900;text-transform:uppercase;line-height:1;animation:aGlow .5s ease infinite alternate}
@keyframes aGlow{from{filter:brightness(1)}to{filter:brightness(1.6) drop-shadow(0 0 .5vw currentColor)}}
#alert-six    .alert-word{color:#00ff58}
#alert-four   .alert-word{color:#4aabff}
#alert-wicket .alert-word{color:#ff5533}
.alert-emoji {font-size:clamp(13px,2.5vw,38px);line-height:1}
.alert-player{font-size:clamp(6px,.86vw,11px);color:rgba(220,240,255,.82);font-weight:700;letter-spacing:.08vw;text-align:center;max-width:86%;line-height:1.3}
.alert-ppl   {font-family:'Arial Black',Arial,sans-serif;font-size:clamp(5px,.66vw,9px);font-weight:900;letter-spacing:.42vw;text-transform:uppercase;opacity:.5;margin-top:.12vw}
#alert-six    .alert-ppl{color:#88ffaa}
#alert-four   .alert-ppl{color:#88ccff}
#alert-wicket .alert-ppl{color:#ffaa88}

/* ══════════════════════════════════════════════════════════════════
   PREMIUM SCOREBAR
   ┌──────┬─────────────────────────┬─────────────────────┬──────┐
   │ LOGO │    ▲▲▲ PILL ▲▲▲        │ [RR] [·] [BOWLER]   │ LOGO │
   │      ├─────────────────────────┼─────────────────────┤      │
   │      │  [STRIKER★] [/] [NON]   │  THIS OVER ● ● ●    │      │
   └──────┴─────────────────────────┴─────────────────────┴──────┘
   CSS Grid: 4 cols × 2 rows; logos span full height
══════════════════════════════════════════════════════════════════ */
#bar{
  position:fixed;bottom:0;left:0;right:0;
  height:var(--bh);
  display:none;
  grid-template-columns: var(--sw) 1fr var(--rw) var(--sw);
  grid-template-rows: var(--r1) calc(100% - var(--r1));
  /* Dark glass base */
  background:linear-gradient(180deg,rgba(5,9,26,.96),rgba(3,6,18,.99));
}

/* Gold hairline across entire top edge */
#bar::before{
  content:'';position:absolute;
  top:0;left:0;right:0;height:2px;z-index:30;
  background:linear-gradient(90deg,transparent 0%,var(--gold) 18%,var(--gold) 82%,transparent 100%);
  opacity:.65;
}

/* ── LEFT LOGO (spans both rows) ── */
.ll{
  grid-column:1;grid-row:1/3;
  background:linear-gradient(150deg,rgba(0,38,100,.99),rgba(0,18,58,.99));
  clip-path:polygon(0 0,76% 0,100% 100%,0 100%);
  display:flex;align-items:center;justify-content:center;
  padding-right:clamp(3px,.5vw,7px);
  z-index:5;
}
.ll img{
  width:clamp(22px,3.1vw,44px);height:clamp(22px,3.1vw,44px);
  object-fit:contain;border-radius:50%;
  filter:drop-shadow(0 0 5px rgba(255,255,255,.18));
}

/* ── PILL WRAP (row 1, center col) ── */
.pill-wrap{
  grid-column:2;grid-row:1;
  display:flex;align-items:flex-end;
  overflow:visible;z-index:10;
}

/* The pill itself — premium lime with gold inner edge */
.pill{
  position:relative;
  margin-top:calc(-1 * var(--rise));
  background:linear-gradient(162deg,#d6f500 0%,#bde200 50%,#a8cd00 100%);
  border-radius:clamp(5px,.7vw,11px) clamp(5px,.7vw,11px) 0 0;
  border:1.5px solid rgba(0,0,0,.1);
  border-bottom:none;
  width:auto;
  display:flex;align-items:center;
  padding:clamp(4px,.55vh,9px) clamp(12px,1.6vw,22px) clamp(3px,.45vh,7px);
  gap:0;
  box-shadow:
    0 -7px 28px rgba(0,0,0,.38),
    0 -2px 9px rgba(170,240,0,.18),
    inset 0 1.5px 0 rgba(255,255,255,.42),
    inset 0 -1px 0 rgba(0,0,0,.06);
}
/* Subtle inner shimmer */
.pill::after{
  content:'';position:absolute;
  top:0;left:0;right:0;height:40%;
  background:linear-gradient(180deg,rgba(255,255,255,.14),transparent);
  border-radius:inherit;
  pointer-events:none;
}

/* Team abbreviations */
.t-abbr{
  font-family:'Arial Black',Arial,sans-serif;
  font-size:clamp(10px,1.38vw,19px);
  font-weight:900;
  color:#0b1700;
  text-transform:uppercase;
  letter-spacing:.02vw;
  line-height:1;
  white-space:nowrap;
}
/* 'v' separator */
.vs-txt{
  font-size:clamp(7px,.8vw,11px);
  color:rgba(30,50,0,.65);
  font-weight:700;
  padding:0 clamp(5px,.7vw,11px);
  line-height:1;
}

/* Vertical divider in pill */
.pill-sep{
  width:1.5px;
  height:clamp(17px,2.3vh,32px);
  background:rgba(0,0,0,.16);
  border-radius:1px;
  align-self:center;
  flex-shrink:0;
  margin:0 clamp(8px,1.1vw,17px);
}

/* BIG score */
.score-big{
  font-family:'Arial Black',Arial,sans-serif;
  font-size:clamp(22px,4.2vw,56px);
  font-weight:900;
  color:#000;
  letter-spacing:-.04vw;
  line-height:1;
  white-space:nowrap;
  flex-shrink:0;
}

/* Overs block */
.ov-block{
  display:flex;flex-direction:column;
  align-items:center;justify-content:center;
  gap:0;line-height:1;
  margin-left:clamp(7px,1vw,15px);
  flex-shrink:0;
}
.ov-num{font-size:clamp(11px,1.55vw,21px);font-weight:900;color:#0b1700;line-height:1;white-space:nowrap}
.ov-lbl{font-size:clamp(4px,.43vw,6px);color:rgba(20,40,0,.6);text-transform:uppercase;letter-spacing:.08vw}

/* Innings badge */
.inn-dot{
  width:clamp(14px,1.6vw,20px);height:clamp(14px,1.6vw,20px);
  border-radius:50%;
  background:rgba(0,0,0,.24);
  border:1.5px solid rgba(0,0,0,.3);
  display:flex;align-items:center;justify-content:center;
  font-size:clamp(6px,.75vw,10px);font-weight:900;color:#fff;
  flex-shrink:0;
  margin-left:clamp(5px,.65vw,10px);
}

/* ── BATTER ROW (row 2, center col) ── */
.bat-row{
  grid-column:2;grid-row:2;
  background:rgba(3,6,18,.75);
  display:flex;align-items:center;
  padding:0 clamp(8px,1.1vw,16px);
  gap:clamp(5px,.72vw,10px);
  border-top:1px solid var(--border);
  overflow:hidden;
}

/* Left-border accent batter cards */
.bat-card{
  display:flex;align-items:center;
  gap:clamp(4px,.48vw,7px);
  padding:clamp(2px,.3vh,5px) clamp(8px,1vw,14px) clamp(2px,.3vh,5px) clamp(10px,1.2vw,16px);
  border-radius:0 clamp(4px,.5vw,6px) clamp(4px,.5vw,6px) 0;
  white-space:nowrap;flex-shrink:0;
  position:relative;
}
/* Left accent stripe */
.bat-card::before{
  content:'';position:absolute;
  left:0;top:12%;bottom:12%;
  width:3px;border-radius:2px;
}
.bat-card.striker-card{
  background:linear-gradient(135deg,rgba(245,197,24,.13),rgba(245,197,24,.04));
  border:1px solid var(--gold-border);
  box-shadow:0 0 12px rgba(245,197,24,.08);
}
.bat-card.striker-card::before{background:var(--gold)}
.bat-card.nonstriker-card{
  background:linear-gradient(135deg,rgba(77,166,255,.13),rgba(77,166,255,.04));
  border:1px solid var(--blue-border);
  box-shadow:0 0 10px rgba(77,166,255,.07);
}
.bat-card.nonstriker-card::before{background:var(--blue)}

.bat-name{
  font-size:clamp(8px,1.08vw,15px);
  font-weight:900;text-transform:uppercase;
  letter-spacing:.04vw;line-height:1;white-space:nowrap;
}
.bat-name.sn{color:var(--gold)}
.bat-name.nn{color:rgba(200,225,255,.85)}
.bat-star{font-size:clamp(8px,1.02vw,13px);color:var(--gold);font-weight:900;margin-left:-1px}

.bat-runs{
  font-family:'Arial Black',Arial,sans-serif;
  font-size:clamp(13px,1.55vw,21px);
  font-weight:900;line-height:1;white-space:nowrap;
}
.bat-runs.sr{color:#fff}
.bat-runs.nr{color:rgba(185,215,255,.72)}

.bat-balls{
  font-size:clamp(6px,.78vw,10px);
  line-height:1;white-space:nowrap;
}
.bat-balls.sb{color:rgba(200,220,255,.38)}
.bat-balls.nb{color:rgba(155,185,240,.35)}

.bat-slash{
  font-size:clamp(18px,2.2vw,30px);
  color:rgba(255,255,255,.1);
  font-weight:100;flex-shrink:0;
  user-select:none;
}

/* ── RIGHT PANEL (spans both rows) ── */
.right-panel{
  grid-column:3;grid-row:1/3;
  display:flex;flex-direction:column;
  background:rgba(4,7,22,.82);
  border-left:1px solid var(--border);
  overflow:hidden;position:relative;
}
/* Vertical gold accent on left edge */
.right-panel::before{
  content:'';position:absolute;
  left:0;top:10%;bottom:10%;width:2px;
  background:linear-gradient(180deg,transparent,var(--gold),transparent);
  opacity:.35;z-index:2;
}

/* TOP HALF — RR badge | divider | bowler */
.rp-top{
  flex:0 0 var(--r1);
  display:flex;align-items:center;
  padding:0 clamp(8px,1.1vw,14px) 0 clamp(12px,1.6vw,18px);
  gap:clamp(5px,.7vw,10px);
  border-bottom:1px solid var(--border);
  overflow:hidden;
}

/* RUN RATE badge */
.rr-badge{
  display:flex;flex-direction:column;
  align-items:center;justify-content:center;
  background:var(--gold-tint);
  border:1px solid var(--gold-border);
  border-radius:clamp(3px,.4vw,6px);
  padding:clamp(2px,.26vh,4px) clamp(6px,.86vw,12px);
  flex-shrink:0;gap:clamp(0px,.06vh,1px);
  box-shadow:0 0 10px rgba(245,197,24,.08);
}
.rr-lbl{
  font-size:clamp(4.5px,.52vw,7.5px);
  font-weight:700;color:rgba(245,197,24,.68);
  text-transform:uppercase;letter-spacing:.14vw;
  white-space:nowrap;line-height:1;
}
.rr-num{
  font-family:'Arial Black',Arial,sans-serif;
  font-size:clamp(13px,1.78vw,23px);
  font-weight:900;color:var(--gold);
  line-height:1;white-space:nowrap;
  text-shadow:0 0 12px rgba(245,197,24,.4);
}

/* Thin divider */
.rp-vdiv{
  width:1px;height:52%;
  background:var(--border);
  align-self:center;flex-shrink:0;
}

/* Bowler block */
.bowl-block{
  display:flex;flex-direction:column;
  justify-content:center;
  gap:clamp(1px,.14vh,2px);
  flex:1;min-width:0;overflow:hidden;
}
.bowl-row{display:flex;align-items:center;gap:clamp(3px,.42vw,6px)}
.ball-ico{
  width:clamp(7px,1vw,13px);height:clamp(7px,1vw,13px);
  border-radius:50%;flex-shrink:0;
  background:radial-gradient(circle at 33% 33%,#e82500,#8a0000);
  border:1px solid rgba(255,70,40,.45);
  box-shadow:0 0 4px rgba(220,40,0,.35);
}
.bowl-name{
  font-size:clamp(9px,1.08vw,14px);
  font-weight:900;color:#fff;
  text-transform:uppercase;letter-spacing:.03vw;
  white-space:nowrap;overflow:hidden;text-overflow:ellipsis;
}
.bowl-fig{
  font-size:clamp(6px,.72vw,9px);
  color:var(--muted);white-space:nowrap;
}

/* BOTTOM HALF — THIS OVER + balls */
.rp-bot{
  flex:1;
  display:flex;align-items:center;
  padding:0 clamp(8px,1.1vw,14px) 0 clamp(12px,1.6vw,18px);
  gap:clamp(6px,.88vw,12px);
  overflow:hidden;
  background:rgba(0,0,0,.14);
}
.over-lbl{
  font-size:clamp(5px,.54vw,7.5px);
  font-weight:700;color:rgba(185,215,255,.38);
  text-transform:uppercase;letter-spacing:.1vw;
  white-space:nowrap;flex-shrink:0;
}
.over-balls{
  display:flex;gap:clamp(2px,.34vw,5px);
  align-items:center;flex-wrap:nowrap;
}

/* ── RIGHT LOGO (spans both rows) ── */
.rl{
  grid-column:4;grid-row:1/3;
  background:linear-gradient(150deg,rgba(0,32,90,.99),rgba(0,16,52,.99));
  clip-path:polygon(24% 0,100% 0,100% 100%,0 100%);
  display:flex;align-items:center;justify-content:center;
  padding-left:clamp(3px,.5vw,7px);
}
.rl img{
  width:clamp(22px,3.1vw,44px);height:clamp(22px,3.1vw,44px);
  object-fit:contain;border-radius:50%;
  filter:drop-shadow(0 0 5px rgba(255,255,255,.16));
}

/* ── BALL DOTS ── */
.oball{
  width:clamp(12px,1.68vw,22px);height:clamp(12px,1.68vw,22px);
  border-radius:50%;
  display:flex;align-items:center;justify-content:center;
  font-size:clamp(5px,.68vw,9px);font-weight:900;flex-shrink:0;
  box-shadow:inset 0 1px 3px rgba(0,0,0,.3),0 1px 2px rgba(0,0,0,.2);
}
.ob-empty{background:rgba(255,255,255,.04);border:1.5px solid rgba(255,255,255,.1)}
.ob-dot  {background:rgba(75,85,108,.7);border:1.5px solid rgba(125,138,165,.35);color:rgba(255,255,255,.6)}
.ob-run  {background:#155c0e;border:1.5px solid #32a022;color:#fff}
.ob-four {background:#003298;border:1.5px solid #3876ee;color:#fff}
.ob-six  {background:#9e3600;border:1.5px solid #f07820;color:#fff}
.ob-wide {background:rgba(82,62,0,.84);border:1.5px solid #7c5c00;color:#ffe000;font-size:clamp(4px,.44vw,6.5px)}
.ob-nb   {background:rgba(82,62,0,.84);border:1.5px solid #7c5c00;color:#ffe000;font-size:clamp(4px,.43vw,6px)}
.ob-wkt  {background:#880000;border:1.5px solid #f03020;color:#fff;box-shadow:inset 0 1px 3px rgba(0,0,0,.38),0 0 6px rgba(255,30,0,.35)}

/* ── PORTRAIT TUNE ── */
@media (orientation:portrait){
  .score-big   {font-size:clamp(17px,4.8vw,36px)!important}
  .t-abbr      {font-size:clamp(8px,2.2vw,14px)!important}
  .ov-num      {font-size:clamp(9px,2vw,15px)!important}
  .rr-num      {font-size:clamp(11px,2.8vw,20px)!important}
  .bowl-name   {font-size:clamp(8px,1.9vw,13px)!important}
  .bat-name    {font-size:clamp(7px,1.8vw,12px)!important}
  .bat-runs    {font-size:clamp(10px,2.4vw,16px)!important}
  .bat-card    {padding-left:clamp(7px,2vw,11px)!important;padding-right:clamp(5px,1.6vw,9px)!important}
  .oball       {width:clamp(10px,2.7vw,17px)!important;height:clamp(10px,2.7vw,17px)!important}
}
</style>
</head>
<body>

<!-- ══ SPONSOR ══ -->
<div id="sponsor">
  <div class="sponsor-box">
    <div class="sname">KM&amp;S Complex</div>
    <div class="stag">✦ Official Sponsor ✦</div>
  </div>
</div>

<!-- ══ WATERMARK ══ -->
<div id="watermark">
  <img src="https://ppl2026-frontend.onrender.com/icons/icon-192.png" alt="PPL" onerror="this.style.display='none'">
  <div>
    <div class="wm-tag">Official</div>
    <div class="wm-name">PPL 2026</div>
  </div>
</div>

<!-- ══ NO LIVE ══ -->
<div id="no-live">
  <h2>⏳ Waiting for Live Match</h2>
  <p>Overlay activates when scoring begins</p>
</div>

<!-- ══ ALERTS ══ -->
<div class="alert" id="alert-six">
  <img class="alert-logo" src="https://ppl2026-frontend.onrender.com/icons/icon-192.png" alt="">
  <div class="alert-emoji">🚀</div>
  <div class="alert-word">SIX!</div>
  <div class="alert-player" id="six-player"></div>
  <div class="alert-ppl">PPL 2026</div>
</div>
<div class="alert" id="alert-four">
  <img class="alert-logo" src="https://ppl2026-frontend.onrender.com/icons/icon-192.png" alt="">
  <div class="alert-emoji">⚡</div>
  <div class="alert-word">FOUR!</div>
  <div class="alert-player" id="four-player"></div>
  <div class="alert-ppl">PPL 2026</div>
</div>
<div class="alert" id="alert-wicket">
  <img class="alert-logo" src="https://ppl2026-frontend.onrender.com/icons/icon-192.png" alt="">
  <div class="alert-emoji">💀</div>
  <div class="alert-word">WICKET!</div>
  <div class="alert-player" id="wkt-player"></div>
  <div class="alert-ppl">PPL 2026</div>
</div>

<!-- ══════════════════════ SCOREBAR ══════════════════════ -->
<div id="bar">

  <!-- Left logo -->
  <div class="ll">
    <img src="https://ppl2026-frontend.onrender.com/icons/icon-192.png" alt="" onerror="this.style.display='none'">
  </div>

  <!-- ── PILL (row 1, center) ── -->
  <div class="pill-wrap">
    <div class="pill">
      <span class="t-abbr" id="t-field">FLD</span>
      <span class="vs-txt">v</span>
      <span class="t-abbr" id="t-bat">BAT</span>
      <div class="pill-sep"></div>
      <span class="score-big" id="score">0-0</span>
      <div class="pill-sep"></div>
      <div class="ov-block">
        <span class="ov-num" id="overs">0.0</span>
        <span class="ov-lbl">Overs</span>
      </div>
      <div class="inn-dot" id="inn">1</div>
    </div>
  </div>

  <!-- ── BATTERS (row 2, center) ── -->
  <div class="bat-row">
    <!-- Striker — gold accent card -->
    <div class="bat-card striker-card">
      <span class="bat-name sn" id="st-name">STRIKER</span>
      <span class="bat-star">★</span>
      <span class="bat-runs sr" id="st-runs">0</span>
      <span class="bat-balls sb" id="st-balls">(0)</span>
    </div>

    <span class="bat-slash">|</span>

    <!-- Non-striker — blue accent card -->
    <div class="bat-card nonstriker-card">
      <span class="bat-name nn" id="ns-name">NON-STR</span>
      <span class="bat-runs nr" id="ns-runs">0</span>
      <span class="bat-balls nb" id="ns-balls">(0)</span>
    </div>
  </div>

  <!-- ── RIGHT PANEL (spans both rows) ── -->
  <div class="right-panel">

    <!-- Top: [RR badge] [·] [bowler name / fig] -->
    <div class="rp-top">
      <div class="rr-badge">
        <span class="rr-lbl" id="rr-lbl">RUN RATE</span>
        <span class="rr-num" id="rr-num">0.00</span>
      </div>
      <div class="rp-vdiv"></div>
      <div class="bowl-block">
        <div class="bowl-row">
          <div class="ball-ico"></div>
          <span class="bowl-name" id="bowl-name">BOWLER</span>
        </div>
        <span class="bowl-fig" id="bowl-fig">0.0 · 0R · 0W</span>
      </div>
    </div>

    <!-- Bottom: THIS OVER + balls -->
    <div class="rp-bot">
      <span class="over-lbl">THIS OVER</span>
      <div class="over-balls" id="over-balls"></div>
    </div>

  </div><!-- /.right-panel -->

  <!-- Right logo -->
  <div class="rl">
    <img src="https://ppl2026-frontend.onrender.com/icons/icon-192.png" alt="" onerror="this.style.display='none'">
  </div>

</div><!-- /#bar -->

<script>
const API='https://ppl2026-backend.onrender.com/api/live';
let prevLast=null,alertTimer=null,lastMatchId=null;

function abbr(n){
  if(!n)return'???';
  const w=n.trim().split(/\s+/);
  return(w.length>=2?w.map(x=>x[0]).join(''):n.trim().slice(0,3)).toUpperCase();
}
function firstName(n){
  if(!n)return'—';
  return n.trim().split(/\s+/)[0].toUpperCase();
}
function ballCls(b){
  if(b==='W') return'ob-wkt';
  if(b==='6') return'ob-six';
  if(b==='4') return'ob-four';
  if(b==='Wd')return'ob-wide';
  if(b==='NB')return'ob-nb';
  if(b==='•'||b==='0')return'ob-dot';
  return'ob-run';
}
function ballLbl(b){return b==='•'?'0':b}

function showAlert(id,line){
  document.querySelectorAll('.alert').forEach(e=>e.classList.remove('show'));
  if(alertTimer)clearTimeout(alertTimer);
  const el=document.getElementById(id);
  void el.offsetWidth;
  el.classList.add('show');
  const pid=id==='alert-six'?'six-player':id==='alert-four'?'four-player':'wkt-player';
  document.getElementById(pid).textContent=line||'';
  alertTimer=setTimeout(()=>el.classList.remove('show'),3800);
}

async function update(){
  try{
    const res=await fetch(API,{cache:'no-store'});
    const json=await res.json();
    const d=json.data??json;

    const bar=document.getElementById('bar');
    if(!d||!d.matchId){
      bar.style.display='none';
      document.getElementById('no-live').style.display='flex';
      lastMatchId=null;prevLast=null;return;
    }
    bar.style.display='grid';
    document.getElementById('no-live').style.display='none';
    if(d.matchId!==lastMatchId){lastMatchId=d.matchId;prevLast=null}

    const batting =d.innings===2?d.bowlingFirst:d.battingFirst;
    const fielding=d.innings===2?d.battingFirst:d.bowlingFirst;
    document.getElementById('t-bat').textContent=abbr(batting);
    document.getElementById('t-field').textContent=abbr(fielding);
    document.getElementById('score').textContent=`${d.runs}-${d.wickets}`;
    document.getElementById('inn').textContent=d.innings===2?'2':'1';

    const ov=Math.floor(d.balls/6),bl=d.balls%6;
    document.getElementById('overs').textContent=`${ov}.${bl}`;

    const crr=d.balls>0?(d.runs/(d.balls/6)).toFixed(2):'0.00';
    if(d.innings===2&&d.target){
      const needed=d.target-d.runs;
      const remB=Math.max(0,(10-ov)*6-bl);
      const rrr=remB>0?(needed/(remB/6)).toFixed(2):'—';
      document.getElementById('rr-lbl').textContent='REQ RATE';
      document.getElementById('rr-num').textContent=rrr;
    }else{
      document.getElementById('rr-lbl').textContent='RUN RATE';
      document.getElementById('rr-num').textContent=crr;
    }

    const b=d.currentBowler;
    if(b&&b.name){
      const bov=Math.floor((b.ballsBowled||0)/6),bbl=(b.ballsBowled||0)%6;
      document.getElementById('bowl-name').textContent=firstName(b.name);
      document.getElementById('bowl-fig').textContent=`${bov}.${bbl} · ${b.runsConceded||0}R · ${b.wickets||0}W`;
    }

    const st=d.striker;
    if(st&&st.name){
      document.getElementById('st-name').textContent=firstName(st.name);
      document.getElementById('st-runs').textContent=st.runs||0;
      document.getElementById('st-balls').textContent=`(${st.balls||0})`;
    }
    const ns=d.nonstriker;
    if(ns&&ns.name){
      document.getElementById('ns-name').textContent=firstName(ns.name);
      document.getElementById('ns-runs').textContent=ns.runs||0;
      document.getElementById('ns-balls').textContent=`(${ns.balls||0})`;
    }

    const allBalls=d.lastBalls||[];
    const curBalls=allBalls.slice(ov*6);
    const ballsDiv=document.getElementById('over-balls');
    ballsDiv.innerHTML='';
    for(let i=0;i<7;i++){
      const div=document.createElement('div');
      div.className='oball';
      if(i<curBalls.length){
        div.classList.add(ballCls(curBalls[i]));
        div.textContent=ballLbl(curBalls[i]);
      }else{
        div.classList.add('ob-empty');
      }
      ballsDiv.appendChild(div);
    }

    const latest=allBalls[allBalls.length-1];
    if(latest!==prevLast&&prevLast!==null){
      const stLine=st?.name?`${st.name}  ${st.runs}(${st.balls})`:'';
      if(latest==='6')showAlert('alert-six',stLine);
      else if(latest==='4')showAlert('alert-four',stLine);
      else if(latest==='W')showAlert('alert-wicket',stLine);
    }
    prevLast=latest;
  }catch(e){console.error('[PPL]',e)}
}
update();
setInterval(update,1000);
</script>
</body>
</html>
