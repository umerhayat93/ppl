<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>PPL Broadcast Overlay</title>

<style>
body {
  margin: 0;
  background: transparent;
  font-family: 'Segoe UI', sans-serif;
  color: white;
  overflow: hidden;
}

/* MAIN BAR */
.overlay {
  position: absolute;
  bottom: 0;
  width: 100%;
  padding: 15px 25px;
  background: linear-gradient(to right, #0f0f0f, #1c1c1c);
}

/* TOP ROW */
.top-row {
  display: flex;
  justify-content: space-between;
  align-items: center;
}

/* LOGO */
.logo {
  font-size: 20px;
  font-weight: bold;
  color: #00ffcc;
}

/* SCORE TAB */
.score-tab {
  text-align: center;
}

.score {
  font-size: 42px;
  font-weight: bold;
}

.teams {
  font-size: 18px;
}

.overs {
  font-size: 14px;
  opacity: 0.7;
}

/* RIGHT PANEL */
.right-panel {
  text-align: right;
  font-size: 14px;
}

/* SECOND ROW */
.second-row {
  display: flex;
  justify-content: space-between;
  margin-top: 8px;
}

/* BATTERS */
.batters {
  display: flex;
  gap: 20px;
}

.striker {
  color: #00ffcc;
  font-weight: bold;
}

/* BALLS */
.balls {
  margin-top: 10px;
  display: flex;
  gap: 8px;
}

.ball {
  width: 28px;
  height: 28px;
  border-radius: 50%;
  background: #333;
  display: flex;
  align-items: center;
  justify-content: center;
}

.ball.four { background: #007bff; }
.ball.six { background: #00c853; }
.ball.wicket { background: red; }

/* FULL SCREEN EVENTS */
.fullscreen {
  position: fixed;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  display: none;
  justify-content: center;
  align-items: center;
  flex-direction: column;
  font-size: 60px;
  font-weight: bold;
  z-index: 999;
}

.six { background: black; color: #00ff00; }
.four { background: black; color: #00bfff; }
.wicket { background: black; color: red; }

/* BATTER CARD */
.card {
  font-size: 22px;
  margin-top: 15px;
}
</style>

</head>

<body>

<!-- FULLSCREEN EVENTS -->
<div id="sixScreen" class="fullscreen six">SIX! 🚀<div>PPL</div></div>
<div id="fourScreen" class="fullscreen four">FOUR! ⚡<div>PPL</div></div>
<div id="wicketScreen" class="fullscreen wicket">
  WICKET! 💀
  <div class="card" id="wicketCard"></div>
</div>

<!-- MAIN OVERLAY -->
<div class="overlay">

  <!-- TOP -->
  <div class="top-row">
    <div class="logo">PPL</div>

    <div class="score-tab">
      <div class="teams" id="teams">A vs B</div>
      <div class="score" id="score">0/0</div>
      <div class="overs" id="overs">(0.0)</div>
    </div>

    <div class="right-panel">
      <div id="rr">RR: 0.0</div>
      <div id="bowler">Bowler</div>
    </div>
  </div>

  <!-- SECOND -->
  <div class="second-row">
    <div class="batters">
      <div id="striker" class="striker">* Batter</div>
      <div id="nonstriker">Batter</div>
    </div>
  </div>

  <!-- BALLS -->
  <div class="balls" id="balls"></div>

</div>

<script>
let lastBall = "";

function showEvent(type, batter=null) {
  const el = document.getElementById(type + "Screen");
  el.style.display = "flex";

  if(type === "wicket" && batter){
    document.getElementById("wicketCard").innerText =
      `${batter.name} ${batter.runs} (${batter.balls}) SR:${((batter.runs/batter.balls)*100).toFixed(1)}`;
  }

  setTimeout(()=> el.style.display="none", 3000);
}

async function updateScore(){
  try{
    const res = await fetch('https://ppl2026-backend.onrender.com/api/live');
    const json = await res.json();
    const d = json.data;
    if(!d) return;

    // TEAMS
    document.getElementById("teams").innerText =
      d.battingFirst + " vs " + d.bowlingFirst;

    // SCORE
    document.getElementById("score").innerText =
      `${d.runs}/${d.wickets}`;

    const overs = Math.floor(d.balls/6)+"."+(d.balls%6);
    document.getElementById("overs").innerText = `(${overs})`;

    // BATTERS
    document.getElementById("striker").innerText =
      `* ${d.striker.name} ${d.striker.runs}(${d.striker.balls})`;

    document.getElementById("nonstriker").innerText =
      `${d.nonstriker.name} ${d.nonstriker.runs}(${d.nonstriker.balls})`;

    // RR (simple)
    document.getElementById("rr").innerText =
      "RR: " + (d.runs / (d.balls/6 || 1)).toFixed(2);

    // BOWLER
    const b = d.currentBowler;
    document.getElementById("bowler").innerText =
      `${b.name} ${Math.floor(b.ballsBowled/6)}.${b.ballsBowled%6}-${b.runsConceded}-${b.wickets}`;

    // BALLS
    const ballsDiv = document.getElementById("balls");
    ballsDiv.innerHTML="";

    const last6 = d.lastBalls.slice(-6);

    last6.forEach(ball=>{
      const el = document.createElement("div");
      el.classList.add("ball");

      if(ball==="4") el.classList.add("four");
      if(ball==="6") el.classList.add("six");
      if(ball==="W") el.classList.add("wicket");

      el.innerText = ball;
      ballsDiv.appendChild(el);
    });

    // EVENTS
    const latest = last6[last6.length-1];

    if(latest !== lastBall){
      if(latest==="6") showEvent("six");
      if(latest==="4") showEvent("four");
      if(latest==="W") showEvent("wicket", d.striker);

      lastBall = latest;
    }

  }catch(e){
    console.log(e);
  }
}

setInterval(updateScore,1000);
updateScore();
</script>

</body>
</html>
