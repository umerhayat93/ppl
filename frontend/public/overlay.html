<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>PPL 2026 Live Overlay</title>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html,body{
  width:100vw;height:100vh;
  background:transparent;
  overflow:hidden;
  font-family:'Arial Narrow','Roboto Condensed',Arial,sans-serif;
  -webkit-font-smoothing:antialiased;
}

/* ══════════════════════
   SPONSOR — top right
══════════════════════ */
#sponsor{
  position:fixed;top:1.6vh;right:1.4vw;
  z-index:100;
}
.sponsor-box{
  background:linear-gradient(135deg,rgba(0,50,110,0.9),rgba(0,25,70,0.93));
  border:1px solid rgba(135,206,250,0.4);
  border-radius:0.45vw;
  padding:0.4vh 1vw 0.35vh;
  text-align:center;
  position:relative;overflow:hidden;
  box-shadow:0 2px 14px rgba(0,100,255,0.2);
  animation:sponsorPulse 4s ease-in-out infinite;
}
@keyframes sponsorPulse{
  0%,100%{box-shadow:0 2px 14px rgba(0,100,255,0.2)}
  50%    {box-shadow:0 2px 20px rgba(0,160,255,0.38)}
}
.sponsor-box::after{
  content:'';position:absolute;
  top:0;left:-60%;width:35%;height:100%;
  background:linear-gradient(90deg,transparent,rgba(255,255,255,0.07),transparent);
  animation:shimmer 4.5s ease-in-out infinite;
}
@keyframes shimmer{0%{left:-60%}100%{left:140%}}
.sname{
  font-family:'Arial Black',Arial,sans-serif;
  font-size:clamp(9px,1.15vw,15px);
  font-weight:900;color:#87CEFA;
  letter-spacing:0.1vw;text-transform:uppercase;
  position:relative;z-index:1;
}
.stag{
  font-size:clamp(6px,0.55vw,8px);
  color:rgba(200,230,255,0.6);letter-spacing:0.18vw;
  text-transform:uppercase;margin-top:0.08vh;
  position:relative;z-index:1;
}

/* ══════════════════════
   WATERMARK — top left
══════════════════════ */
#watermark{
  position:fixed;top:1.4vh;left:1.3vw;
  display:flex;align-items:center;gap:0.6vw;
  z-index:50;
  filter:drop-shadow(0 2px 8px rgba(0,0,0,0.8));
}
#watermark img{
  width:clamp(34px,4.5vw,58px);height:clamp(34px,4.5vw,58px);
  object-fit:contain;border-radius:0.45vw;
}
.wm-tag{ font-size:clamp(6px,0.6vw,9px);color:#87CEFA;font-weight:700;letter-spacing:0.2vw;text-transform:uppercase;line-height:1 }
.wm-name{ font-family:'Arial Black',Arial,sans-serif;font-size:clamp(11px,1.6vw,22px);font-weight:900;color:#fff;line-height:1 }

/* ══════════════════════
   NO LIVE SCREEN
══════════════════════ */
#no-live{
  position:fixed;inset:0;
  background:rgba(0,8,25,0.92);
  display:flex;align-items:center;justify-content:center;
  flex-direction:column;gap:1.8vh;z-index:200;
}
#no-live h2{ font-size:clamp(13px,2vw,28px);color:rgba(135,206,250,0.45);font-weight:900;letter-spacing:0.35vw;text-transform:uppercase }
#no-live p{ font-size:clamp(8px,0.85vw,12px);color:rgba(135,206,250,0.25);letter-spacing:0.18vw }

/* ══════════════════════════════════════
   CIRCULAR ALERTS — center, not fullscreen
══════════════════════════════════════ */
.alert{
  position:fixed;
  top:40%;left:50%;
  transform:translate(-50%,-50%) scale(0);
  width:clamp(170px,26vw,320px);
  height:clamp(170px,26vw,320px);
  border-radius:50%;
  display:flex;flex-direction:column;
  align-items:center;justify-content:center;
  z-index:999;pointer-events:none;
  gap:0.2vw;
  backdrop-filter:blur(6px);
}
.alert.show{animation:alertSpring 3.8s cubic-bezier(.34,1.56,.64,1) forwards}
@keyframes alertSpring{
  0%  {transform:translate(-50%,-50%) scale(0);opacity:0}
  9%  {transform:translate(-50%,-50%) scale(1.1);opacity:1}
  16% {transform:translate(-50%,-50%) scale(0.95)}
  22% {transform:translate(-50%,-50%) scale(1.03)}
  28% {transform:translate(-50%,-50%) scale(1);opacity:1}
  76% {transform:translate(-50%,-50%) scale(1);opacity:1}
  100%{transform:translate(-50%,-50%) scale(0.7);opacity:0}
}
#alert-six{
  background:radial-gradient(circle at 40% 40%,rgba(0,70,15,0.93),rgba(0,25,5,0.97) 70%);
  border:clamp(2px,0.28vw,4px) solid rgba(0,220,65,0.8);
  box-shadow:0 0 clamp(20px,4.5vw,70px) rgba(0,200,55,0.45);
}
#alert-four{
  background:radial-gradient(circle at 40% 40%,rgba(0,18,95,0.93),rgba(0,6,38,0.97) 70%);
  border:clamp(2px,0.28vw,4px) solid rgba(55,135,255,0.85);
  box-shadow:0 0 clamp(20px,4.5vw,70px) rgba(35,115,255,0.45);
}
#alert-wicket{
  background:radial-gradient(circle at 40% 40%,rgba(95,0,0,0.93),rgba(38,0,0,0.97) 70%);
  border:clamp(2px,0.28vw,4px) solid rgba(255,45,15,0.85);
  box-shadow:0 0 clamp(20px,4.5vw,70px) rgba(255,35,0,0.45);
}
.alert-logo{width:clamp(28px,4.5vw,60px);height:clamp(28px,4.5vw,60px);object-fit:contain;border-radius:0.6vw;filter:drop-shadow(0 0 0.5vw rgba(255,255,255,0.4))}
.alert-word{font-family:'Arial Black',Arial,sans-serif;font-size:clamp(22px,4.8vw,66px);font-weight:900;text-transform:uppercase;line-height:1;animation:aGlow 0.5s ease infinite alternate}
@keyframes aGlow{from{filter:brightness(1)}to{filter:brightness(1.55) drop-shadow(0 0 0.5vw currentColor)}}
#alert-six    .alert-word{color:#00ff58}
#alert-four   .alert-word{color:#4aabff}
#alert-wicket .alert-word{color:#ff5533}
.alert-emoji{font-size:clamp(14px,2.6vw,38px);line-height:1}
.alert-player{font-size:clamp(7px,0.9vw,12px);color:rgba(220,240,255,0.82);font-weight:700;letter-spacing:0.08vw;text-align:center;max-width:86%;line-height:1.3}
.alert-ppl{font-family:'Arial Black',Arial,sans-serif;font-size:clamp(6px,0.7vw,10px);font-weight:900;letter-spacing:0.42vw;text-transform:uppercase;opacity:0.52;margin-top:0.12vw}
#alert-six    .alert-ppl{color:#88ffaa}
#alert-four   .alert-ppl{color:#88ccff}
#alert-wicket .alert-ppl{color:#ffaa88}

/* ══════════════════════════════════════════
   SCOREBAR — 2 rows, bottom of screen
   Matches reference exactly
══════════════════════════════════════════ */
#bar{
  position:fixed;bottom:0;left:0;right:0;
  /* Professional height: 10-11% of viewport in landscape, max 96px */
  height:clamp(64px,10.5vh,96px);
  display:none;flex-direction:column;
}
/* Portrait: slightly taller since screen is tall */
@media (orientation:portrait){
  #bar{ height:clamp(56px,8.5vh,80px); }
  .pill{ margin-top:clamp(-10px,-1.5vh,-4px) !important; }
  .score-big{ font-size:clamp(16px,5vw,36px) !important; }
  .teams-txt{ font-size:clamp(9px,2.5vw,15px) !important; }
  .ov-num{ font-size:clamp(10px,2vw,16px) !important; }
  .rr-num{ font-size:clamp(10px,2.2vw,16px) !important; }
  .bowl-name{ font-size:clamp(8px,1.6vw,13px) !important; }
  .bat-n{ font-size:clamp(8px,1.8vw,13px) !important; }
  .bat-r{ font-size:clamp(11px,2.4vw,17px) !important; }
  .over-lbl{ font-size:clamp(5px,1vw,8px) !important; }
  .oball{ width:clamp(13px,3.2vw,22px) !important; height:clamp(13px,3.2vw,22px) !important; }
}

/* ─── ROW 1: LOGO | PILL | RR | THIS OVER | BOWLER | RIGHT-LOGO ─── */
.r1{
  flex:0 0 55%;
  display:flex;align-items:stretch;
  position:relative;overflow:visible;
}

/* Left logo */
.left-logo{
  flex:0 0 clamp(46px,5.8vw,76px);
  background:linear-gradient(145deg,#004499,#002266);
  display:flex;align-items:center;justify-content:center;
  clip-path:polygon(0 0,78% 0,100% 100%,0 100%);
  padding-right:0.9vw;z-index:3;flex-shrink:0;
}
.left-logo img{width:clamp(26px,3.4vw,46px);height:clamp(26px,3.4vw,46px);object-fit:contain;border-radius:0.35vw}

/* ── GREEN PILL — bulges up like PSL ── */
.pill-wrap{flex:0 0 auto;display:flex;align-items:flex-end;z-index:10;position:relative}
.pill{
  margin-top:clamp(-18px,-2.8vh,-8px);
  background:linear-gradient(175deg,#c4f000 0%,#aad800 100%);
  border-radius:clamp(4px,0.6vw,10px) clamp(4px,0.6vw,10px) 0 0;
  border:1.5px solid rgba(0,0,0,0.1);
  border-bottom:none;
  display:flex;align-items:center;
  padding:clamp(3px,0.55vh,8px) clamp(7px,1vw,14px) clamp(2px,0.4vh,6px);
  gap:clamp(4px,0.7vw,12px);
  box-shadow:0 -4px 18px rgba(0,0,0,0.32),0 -1px 6px rgba(150,230,0,0.25),inset 0 1px 0 rgba(255,255,255,0.3);
}
.teams-txt{font-size:clamp(9px,1.2vw,16px);font-weight:900;color:#1a1a00;letter-spacing:0.03vw;text-transform:uppercase;white-space:nowrap;line-height:1}
.teams-txt .vs{color:#4a5c00;font-weight:400;font-size:0.8em;margin:0 0.15vw}
.score-big{font-family:'Arial Black',Arial,sans-serif;font-size:clamp(18px,3.5vw,48px);font-weight:900;color:#000;letter-spacing:-0.04vw;line-height:1;white-space:nowrap}
.overs-box{display:flex;flex-direction:column;align-items:center;justify-content:center;gap:0;line-height:1;border-left:1.5px solid rgba(0,0,0,0.16);padding-left:clamp(5px,0.7vw,11px)}
.ov-num{font-size:clamp(11px,1.5vw,20px);font-weight:900;color:#1a1a00;line-height:1}
.ov-lbl{font-size:clamp(4px,0.48vw,7px);color:#3a4a00;text-transform:uppercase;letter-spacing:0.08vw}
.inn-dot{width:clamp(13px,1.55vw,20px);height:clamp(13px,1.55vw,20px);border-radius:50%;background:rgba(0,0,0,0.22);border:1.5px solid rgba(0,0,0,0.3);display:flex;align-items:center;justify-content:center;font-size:clamp(6px,0.78vw,11px);font-weight:900;color:#fff;flex-shrink:0}

/* ── RIGHT SECTION — all inline horizontal ── */
.right-blk{
  flex:1;
  background:linear-gradient(90deg,rgba(0,35,95,0.96),rgba(0,20,65,0.97));
  display:flex;
  align-items:center;
  overflow:hidden;
  padding:0 0.15vw;
  gap:clamp(2px,0.3vw,5px);
}

/* RR — compact */
.rr-blk{
  flex:0 0 auto;
  display:flex;flex-direction:column;
  justify-content:center;align-items:flex-start;
  padding:0 clamp(5px,0.85vw,12px);
  border-left:1px solid rgba(135,206,250,0.12);
}
.rr-lbl{font-size:clamp(5px,0.6vw,8px);font-weight:700;color:rgba(200,230,255,0.6);text-transform:uppercase;letter-spacing:0.12vw;white-space:nowrap;line-height:1}
.rr-num{font-size:clamp(11px,1.5vw,18px);font-weight:900;color:#FFD700;line-height:1;font-family:'Arial Black',Arial,sans-serif;text-shadow:0 0 8px rgba(255,215,0,0.3)}

/* BOWLER — compact, no flex:1 */
.bowl-blk{
  flex:0 0 auto;
  display:flex;flex-direction:column;
  justify-content:center;align-items:flex-start;
  padding:0 clamp(6px,1vw,14px);
  border-left:none;
  background:transparent;
  min-width:0;
  padding:0 clamp(4px,0.6vw,8px);
}
.bowl-row{display:flex;align-items:center;gap:clamp(3px,0.4vw,7px)}
.ball-ico{width:clamp(9px,1.2vw,15px);height:clamp(9px,1.2vw,15px);border-radius:50%;flex-shrink:0;background:radial-gradient(circle at 33% 33%,#dd2200,#880000);border:1px solid rgba(255,70,40,0.55);box-shadow:0 0 5px rgba(220,40,0,0.35)}
.bowl-name{font-size:clamp(9px,1vw,14px);font-weight:900;color:#fff;text-transform:uppercase;letter-spacing:0.03vw;white-space:nowrap;opacity:0.9}
.bowl-fig{font-size:clamp(5px,0.6vw,9px);font-weight:600;color:rgba(200,230,255,0.65);margin-top:0.12vw;white-space:nowrap;opacity:0.6}




/* THIS OVER — in top row, fills remaining space */
.over-blk{
  flex:1.5;  /* dominant - takes most space */
  display:flex;align-items:center;
  padding:0 clamp(5px,0.75vw,11px);
  border-left:1px solid rgba(135,206,250,0.1);
  gap:clamp(4px,0.6vw,10px);
  overflow:hidden;
}
.over-lbl{font-size:clamp(5px,0.6vw,8px);font-weight:700;color:rgba(200,230,255,0.5);text-transform:uppercase;letter-spacing:0.12vw;white-space:nowrap}
.over-balls{display:flex;gap:clamp(2px,0.38vw,6px);align-items:center}

/* Right logo */
.rt-logo{flex:0 0 clamp(44px,5.8vw,76px);background:linear-gradient(135deg,#003c8a,#001f50);display:flex;align-items:center;justify-content:center;clip-path:polygon(15% 0,100% 0,100% 100%,0 100%);padding-left:1vw}
.rt-logo img{width:clamp(24px,3.2vw,44px);height:clamp(24px,3.2vw,44px);object-fit:contain;border-radius:0.35vw}

/* ─── ROW 2: batters ─── */
.r2{
  flex:1;
  display:flex;align-items:stretch;
}
.r2-left{flex:0 0 clamp(46px,5.8vw,76px);background:linear-gradient(90deg,#002060,#001540);border-top:1px solid rgba(135,206,250,0.07);flex-shrink:0}

.bat-area{
  flex:1;
  background:linear-gradient(90deg,rgba(0,28,80,0.97),rgba(0,18,58,0.97));
  display:flex;align-items:center;
  border-top:1px solid rgba(135,206,250,0.1);
  padding:0 clamp(3px,0.45vw,8px);
  gap:clamp(3px,0.4vw,7px);
}

/* Each batter — green pill like reference */
.bat-card{
  display:flex;align-items:center;
  gap:clamp(3px,0.38vw,6px);
  padding:clamp(1px,0.25vh,4px) clamp(5px,0.85vw,12px);
  border-radius:clamp(2px,0.35vw,5px);
  white-space:nowrap;
  /* GREEN tinted pill matching reference batter row */
  background:rgba(0,180,30,0.12);
  border:1px solid rgba(0,200,50,0.22);
}
.bat-icon{font-size:clamp(7px,0.85vw,12px);opacity:0.65;flex-shrink:0}
/* Striker slash / */
.bat-slash-icon{font-size:clamp(8px,0.9vw,13px);color:rgba(255,255,255,0.4);font-weight:300;margin-right:0.15vw}
.bat-n{font-size:clamp(9px,1.05vw,14px);font-weight:900;text-transform:uppercase;letter-spacing:0.03vw}
.bat-n.sn{color:#FFE000;text-shadow:0 0 6px rgba(255,220,0,0.4)}
.bat-n.nn{color:rgba(200,220,255,0.6)}
.bat-star{font-size:clamp(9px,1.05vw,14px);color:#FFE000;font-weight:900}
.bat-r{font-size:clamp(12px,1.45vw,19px);font-weight:900;font-family:'Arial Black',Arial,sans-serif}
.bat-r.sr{color:#fff}
.bat-r.nr{color:rgba(200,220,255,0.55)}
.bat-b{font-size:clamp(7px,0.76vw,10px)}
.bat-b.sb{color:rgba(255,255,255,0.48)}
.bat-b.nb{color:rgba(150,180,220,0.38)}

.bat-divider{color:rgba(135,206,250,0.18);font-size:clamp(12px,1.5vw,20px);padding:0 clamp(1px,0.2vw,4px);align-self:center;flex-shrink:0}

.r2-right{flex:0 0 clamp(44px,5.8vw,76px);background:rgba(0,15,48,0.97);border-top:1px solid rgba(135,206,250,0.07)}

/* ── Ball dots ── */
.oball{
  width:clamp(14px,1.95vw,25px);height:clamp(14px,1.95vw,25px);
  border-radius:50%;
  display:flex;align-items:center;justify-content:center;
  font-size:clamp(6px,0.78vw,11px);font-weight:900;flex-shrink:0;
  box-shadow:inset 0 1px 3px rgba(0,0,0,0.28),0 1px 2px rgba(0,0,0,0.18);
}
.ob-empty {background:rgba(255,255,255,0.04);border:1.5px solid rgba(135,206,250,0.18)}
.ob-dot   {background:rgba(90,100,120,0.6);border:1.5px solid rgba(140,150,175,0.38);color:rgba(255,255,255,0.65)}
.ob-run   {background:#1a5810;border:1.5px solid #3a9828;color:#fff}
.ob-four  {background:#0035aa;border:1.5px solid #4080ff;color:#fff}
.ob-six   {background:#aa3e00;border:1.5px solid #ff8022;color:#fff}
.ob-wide  {background:rgba(90,70,0,0.75);border:1.5px solid #886600;color:#ffe000;font-size:clamp(4px,0.48vw,7px)}
.ob-nb    {background:rgba(90,70,0,0.75);border:1.5px solid #886600;color:#ffe000;font-size:clamp(4px,0.46vw,6px)}
.ob-wkt   {background:#990000;border:1.5px solid #ff3322;color:#fff;box-shadow:inset 0 1px 3px rgba(0,0,0,0.3),0 0 5px rgba(255,35,0,0.28)}
</style>
</head>
<body>

<!-- Sponsor -->
<div id="sponsor">
  <div class="sponsor-box">
    <div class="sname">KM&amp;S Complex</div>
    <div class="stag">✦ Sponsored By ✦</div>
  </div>
</div>

<!-- Watermark -->
<div id="watermark">
  <img src="https://ppl2026-frontend.onrender.com/icons/icon-192.png" alt="PPL" onerror="this.style.display='none'">
  <div class="wm-text">
    <div class="wm-tag">Official</div>
    <div class="wm-name">PPL 2026</div>
  </div>
</div>

<!-- No live -->
<div id="no-live">
  <h2>⏳ Waiting for Live Match</h2>
  <p>Overlay activates when scoring begins</p>
</div>

<!-- Alerts -->
<div class="alert" id="alert-six">
  <img class="alert-logo" src="https://ppl2026-frontend.onrender.com/icons/icon-192.png" alt="">
  <div class="alert-emoji">🚀</div>
  <div class="alert-word">SIX!</div>
  <div class="alert-player" id="six-player"></div>
  <div class="alert-ppl">PPL 2026</div>
</div>
<div class="alert" id="alert-four">
  <img class="alert-logo" src="https://ppl2026-frontend.onrender.com/icons/icon-192.png" alt="">
  <div class="alert-emoji">⚡</div>
  <div class="alert-word">FOUR!</div>
  <div class="alert-player" id="four-player"></div>
  <div class="alert-ppl">PPL 2026</div>
</div>
<div class="alert" id="alert-wicket">
  <img class="alert-logo" src="https://ppl2026-frontend.onrender.com/icons/icon-192.png" alt="">
  <div class="alert-emoji">💀</div>
  <div class="alert-word">WICKET!</div>
  <div class="alert-player" id="wkt-player"></div>
  <div class="alert-ppl">PPL 2026</div>
</div>

<!-- ═══════ SCOREBAR ═══════ -->
<div id="bar">

  <!-- ROW 1: logo | pill | RR | bowler | spell | THIS OVER → | rt-logo -->
  <div class="r1">
    <div class="left-logo">
      <img src="https://ppl2026-frontend.onrender.com/icons/icon-192.png" alt="" onerror="this.style.display='none'">
    </div>

    <div class="pill-wrap">
      <div class="pill">
        <div class="teams-txt">
          <span id="t-field">FLD</span>
          <span class="vs"> v </span>
          <span id="t-bat">BAT</span>
        </div>
        <span class="score-big" id="score">0-0</span>
        <div class="overs-box">
          <span class="ov-num" id="overs">0.0</span>
          <span class="ov-lbl">Overs</span>
        </div>
        <div class="inn-dot" id="inn">1</div>
      </div>
    </div>

    <!-- RIGHT: RR | bowler | spell | THIS OVER (fills rest) -->
    <div class="right-blk">
      <div class="rr-blk">
        <span class="rr-lbl" id="rr-lbl">RUN-RATE</span>
        <span class="rr-num" id="rr-num">0.00</span>
      </div>

      <div class="bowl-blk">
        <div class="bowl-row">
          <div class="ball-ico"></div>
          <span class="bowl-name" id="bowl-name">BOWLER</span>
        </div>
        <span class="bowl-fig" id="bowl-fig">0.0 · 0R · 0W</span>
      </div>

      <!-- THIS OVER fills remaining space in top row -->
      <div class="over-blk">
        <span class="over-lbl">THIS OVER</span>
        <div class="over-balls" id="over-balls"></div>
      </div>
    </div><!-- /.right-blk -->

    <div class="rt-logo">
      <img src="https://ppl2026-frontend.onrender.com/icons/icon-192.png" alt="" onerror="this.style.display='none'">
    </div>
  </div><!-- /.r1 -->

  <!-- ROW 2: batters only -->
  <div class="r2">
    <div class="r2-left"></div>

    <div class="bat-area">
      <!-- Striker: / ASIF* 17 11 -->
      <div class="bat-card">
        <span class="bat-slash-icon">/</span>
        <span class="bat-icon">🏏</span>
        <span class="bat-n sn" id="st-name">STRIKER</span><span class="bat-star">*</span>
        <span class="bat-r sr" id="st-runs">0</span>
        <span class="bat-b sb" id="st-balls">0</span>
      </div>

      <span class="bat-divider">|</span>

      <!-- Non-striker: EMON 4 6 -->
      <div class="bat-card">
        <span class="bat-icon">🏏</span>
        <span class="bat-n nn" id="ns-name">NON-STR</span>
        <span class="bat-r nr" id="ns-runs">0</span>
        <span class="bat-b nb" id="ns-balls">0</span>
      </div>
    </div>

    <div class="r2-right"></div>
  </div><!-- /.r2 -->

</div><!-- /#bar -->

<script>
const API='https://ppl2026-backend.onrender.com/api/live';
let prevLast=null,alertTimer=null,lastMatchId=null;

function firstName(n){if(!n)return'—';return n.trim().split(/\s+/)[0].toUpperCase()}
function abbr(n){
  if(!n)return'???';
  const w=n.trim().split(/\s+/);
  if(w.length===1)return n.substring(0,4).toUpperCase();
  return w.map(x=>x[0]).join('').substring(0,4).toUpperCase();
}
function ballCls(b){
  if(b==='W')return'ob-wkt';if(b==='6')return'ob-six';if(b==='4')return'ob-four';
  if(b==='Wd')return'ob-wide';if(b==='NB')return'ob-nb';
  if(b==='•'||b==='0')return'ob-dot';return'ob-run';
}
function ballLbl(b){return b==='•'?'0':b}

function showAlert(id,line){
  document.querySelectorAll('.alert').forEach(e=>e.classList.remove('show'));
  if(alertTimer)clearTimeout(alertTimer);
  const el=document.getElementById(id);void el.offsetWidth;
  el.classList.add('show');
  const pid=id==='alert-six'?'six-player':id==='alert-four'?'four-player':'wkt-player';
  document.getElementById(pid).textContent=line||'';
  alertTimer=setTimeout(()=>el.classList.remove('show'),3800);
}

async function update(){
  try{
    const res=await fetch(API,{cache:'no-store'});
    const json=await res.json();
    const d=json.data??json;

    if(!d||!d.matchId){
      document.getElementById('bar').style.display='none';
      document.getElementById('no-live').style.display='flex';
      lastMatchId=null;prevLast=null;return;
    }
    document.getElementById('bar').style.display='flex';
    document.getElementById('no-live').style.display='none';
    if(d.matchId!==lastMatchId){lastMatchId=d.matchId;prevLast=null}

    const batting =d.innings===2?d.bowlingFirst:d.battingFirst;
    const fielding=d.innings===2?d.battingFirst:d.bowlingFirst;
    document.getElementById('t-bat').textContent=abbr(batting);
    document.getElementById('t-field').textContent=abbr(fielding);
    document.getElementById('score').textContent=`${d.runs}-${d.wickets}`;
    document.getElementById('inn').textContent=d.innings===2?'2':'1';

    const ov=Math.floor(d.balls/6),bl=d.balls%6;
    document.getElementById('overs').textContent=`${ov}.${bl}`;

    const crr=d.balls>0?(d.runs/(d.balls/6)).toFixed(2):'0.00';
    if(d.innings===2&&d.target){
      const needed=d.target-d.runs;
      const remB=Math.max(0,(10-ov)*6-bl);
      const rrr=remB>0?(needed/(remB/6)).toFixed(2):'—';
      document.getElementById('rr-lbl').textContent='REQUIRED';
      document.getElementById('rr-num').textContent=rrr;
    } else {
      document.getElementById('rr-lbl').textContent='RUN-RATE';
      document.getElementById('rr-num').textContent=crr;
    }

    const b=d.currentBowler;
    if(b&&b.name){
      const bov=Math.floor((b.ballsBowled||0)/6),bbl=(b.ballsBowled||0)%6;
      document.getElementById('bowl-name').textContent=firstName(b.name);
      document.getElementById('bowl-fig').textContent=`${bov}.${bbl} · ${b.runsConceded||0}R · ${b.wickets||0}W`;
    }

    const st=d.striker;
    if(st&&st.name){
      document.getElementById('st-name').textContent=st.name.toUpperCase();
      document.getElementById('st-runs').textContent=st.runs||0;
      document.getElementById('st-balls').textContent=st.balls||0;
    }
    const ns=d.nonstriker;
    if(ns&&ns.name){
      document.getElementById('ns-name').textContent=ns.name.toUpperCase();
      document.getElementById('ns-runs').textContent=ns.runs||0;
      document.getElementById('ns-balls').textContent=ns.balls||0;
    }

    /* This over balls — in top row */
    const allBalls=d.lastBalls||[];
    const curBalls=allBalls.slice(ov*6);
    const ballsDiv=document.getElementById('over-balls');
    ballsDiv.innerHTML='';
    for(let i=0;i<7;i++){
      const div=document.createElement('div');div.className='oball';
      if(i<curBalls.length){div.classList.add(ballCls(curBalls[i]));div.textContent=ballLbl(curBalls[i])}
      else div.classList.add('ob-empty');
      ballsDiv.appendChild(div);
    }

    const latest=allBalls[allBalls.length-1];
    if(latest!==prevLast&&prevLast!==null){
      const stLine=st?.name?`${st.name}  ${st.runs}(${st.balls})`:'';
      if(latest==='6')showAlert('alert-six',stLine);
      else if(latest==='4')showAlert('alert-four',stLine);
      else if(latest==='W')showAlert('alert-wicket',stLine);
    }
    prevLast=latest;
  }catch(e){console.error('[PPL Overlay]',e)}
}
update();
setInterval(update,1000);
</script>
</body>
</html>
