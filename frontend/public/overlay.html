<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>PPL Live Overlay</title>

<style>
body {
  margin: 0;
  background: transparent;
  font-family: 'Segoe UI', sans-serif;
  color: white;
  overflow: hidden;
}

/* MAIN BAR */
.overlay {
  position: absolute;
  bottom: 30px;
  left: 30px;
  right: 30px;

  display: flex;
  justify-content: space-between;
  align-items: center;

  background: linear-gradient(135deg, rgba(0,0,0,0.85), rgba(20,20,20,0.9));
  padding: 18px 28px;
  border-radius: 18px;
  backdrop-filter: blur(10px);

  box-shadow: 0 0 25px rgba(0,0,0,0.6);
}

/* TEAMS */
.teams {
  font-size: 20px;
  font-weight: 600;
  letter-spacing: 1px;
}

/* SCORE */
.center {
  text-align: center;
}

.score {
  font-size: 42px;
  font-weight: bold;
  transition: 0.3s;
}

.score.flash {
  color: #00ffcc;
  transform: scale(1.2);
}

.overs {
  font-size: 16px;
  opacity: 0.7;
}

/* PLAYERS */
.players {
  display: flex;
  flex-direction: column;
  font-size: 15px;
  gap: 3px;
}

.striker {
  color: #00ffcc;
  font-weight: bold;
}

/* BOWLER */
.bowler {
  text-align: right;
  font-size: 14px;
}

/* BALLS */
.balls {
  position: absolute;
  bottom: 110px;
  left: 50%;
  transform: translateX(-50%);
  display: flex;
  gap: 10px;
}

.ball {
  width: 32px;
  height: 32px;
  border-radius: 50%;
  background: #222;
  display: flex;
  align-items: center;
  justify-content: center;
  font-weight: bold;
  font-size: 14px;
  transition: 0.3s;
}

/* COLORS */
.ball.four { background: #007bff; }
.ball.six { background: #00c853; }
.ball.wicket { background: #d50000; }
.ball.extra { background: orange; }

/* ANIMATION */
.ball.new {
  transform: scale(1.4);
  box-shadow: 0 0 15px white;
}
</style>

</head>

<body>

<div class="overlay">

  <div class="teams">
    <span id="teamA">TEAM A</span> vs <span id="teamB">TEAM B</span>
  </div>

  <div class="center">
    <div class="score" id="score">0/0</div>
    <div class="overs" id="overs">(0.0)</div>
  </div>

  <div class="players">
    <div id="striker" class="striker">Striker</div>
    <div id="nonstriker">Non-Striker</div>
  </div>

  <div class="bowler">
    <div id="bowlerName">Bowler</div>
    <div id="bowlerStats"></div>
  </div>

</div>

<div class="balls" id="balls"></div>

<script>
let lastScore = "";
let lastBallCount = 0;

async function updateScore() {
  try {
    const res = await fetch('https://ppl2026-backend.onrender.com/api/live');
    const json = await res.json();
    const data = json.data;

    if (!data) return;

    // TEAMS
    document.getElementById("teamA").innerText = data.battingFirst || "Team A";
    document.getElementById("teamB").innerText = data.bowlingFirst || "Team B";

    // SCORE
    const currentScore = `${data.runs}/${data.wickets}`;
    const scoreEl = document.getElementById("score");

    if (currentScore !== lastScore) {
      scoreEl.classList.add("flash");
      setTimeout(() => scoreEl.classList.remove("flash"), 300);
      lastScore = currentScore;
    }

    scoreEl.innerText = currentScore;

    // OVERS
    const overs = Math.floor(data.balls / 6) + "." + (data.balls % 6);
    document.getElementById("overs").innerText = `(${overs})`;

    // PLAYERS
    document.getElementById("striker").innerText =
      `${data.striker.name} ${data.striker.runs} (${data.striker.balls})`;

    document.getElementById("nonstriker").innerText =
      `${data.nonstriker.name} ${data.nonstriker.runs} (${data.nonstriker.balls})`;

    // BOWLER
    const b = data.currentBowler;
    document.getElementById("bowlerName").innerText = b.name;

    document.getElementById("bowlerStats").innerText =
      `${Math.floor(b.ballsBowled / 6)}.${b.ballsBowled % 6} - ${b.runsConceded} - ${b.wickets}`;

    // BALLS
    const ballsDiv = document.getElementById("balls");
    ballsDiv.innerHTML = "";

    const last6 = data.lastBalls.slice(-6);

    last6.forEach((ball, i) => {
      const el = document.createElement("div");
      el.classList.add("ball");

      if (ball === "4") el.classList.add("four");
      else if (ball === "6") el.classList.add("six");
      else if (ball === "W") el.classList.add("wicket");
      else if (ball === "NB" || ball === "WD") el.classList.add("extra");

      // highlight newest ball
      if (i === last6.length - 1 && data.balls !== lastBallCount) {
        el.classList.add("new");
        lastBallCount = data.balls;
      }

      el.innerText = ball;
      ballsDiv.appendChild(el);
    });

  } catch (err) {
    console.log("Error:", err);
  }
}

setInterval(updateScore, 1000);
updateScore();
</script>

</body>
</html>
