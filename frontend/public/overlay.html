<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>PPL 2026 Live Overlay</title>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html,body{
  width:100%;height:100%;
  background:transparent;
  overflow:hidden;
  font-family:'Arial Narrow','Roboto Condensed',Arial,sans-serif;
  -webkit-font-smoothing:antialiased;
}

/* ════════════════════════════════════
   CSS VARIABLES — single source of truth
════════════════════════════════════ */
:root{
  --bh: clamp(58px,9.8vh,86px);   /* total bar height           */
  --r1: 55%;                        /* top row %                  */
  --sw: clamp(44px,5.8vw,72px);    /* logo column width          */
  --rw: clamp(200px,26vw,320px);   /* right panel width          */
  --rise: clamp(10px,1.8vh,16px);  /* pill protrusion above bar  */
}
@media (orientation:portrait){
  :root{
    --bh: clamp(70px,10.5vh,96px);
    --sw: clamp(34px,8.5vw,54px);
    --rw: clamp(140px,38vw,210px);
    --rise: clamp(8px,1.4vh,12px);
  }
}

/* ════════════════════
   SPONSOR — top right
════════════════════ */
#sponsor{position:fixed;top:1.5vh;right:1.2vw;z-index:100}
.sponsor-box{
  background:linear-gradient(135deg,rgba(0,50,110,0.92),rgba(0,25,70,0.95));
  border:1px solid rgba(135,206,250,0.38);
  border-radius:4px;padding:.35vh .9vw .3vh;
  text-align:center;position:relative;overflow:hidden;
  box-shadow:0 2px 14px rgba(0,100,255,.2);
  animation:sP 4s ease-in-out infinite;
}
@keyframes sP{0%,100%{box-shadow:0 2px 14px rgba(0,100,255,.2)}50%{box-shadow:0 2px 22px rgba(0,160,255,.4)}}
.sponsor-box::after{content:'';position:absolute;top:0;left:-60%;width:35%;height:100%;background:linear-gradient(90deg,transparent,rgba(255,255,255,.07),transparent);animation:sh 4.5s ease-in-out infinite}
@keyframes sh{0%{left:-60%}100%{left:140%}}
.sname{font-family:'Arial Black',Arial,sans-serif;font-size:clamp(8px,1.1vw,14px);font-weight:900;color:#87CEFA;letter-spacing:.1vw;text-transform:uppercase;position:relative;z-index:1}
.stag{font-size:clamp(5px,.5vw,7px);color:rgba(200,230,255,.55);letter-spacing:.18vw;text-transform:uppercase;margin-top:.08vh;position:relative;z-index:1}

/* ════════════════════
   WATERMARK — top left
════════════════════ */
#watermark{position:fixed;top:1.4vh;left:1.2vw;display:flex;align-items:center;gap:.5vw;z-index:50;filter:drop-shadow(0 2px 8px rgba(0,0,0,.8))}
#watermark img{width:clamp(28px,3.8vw,50px);height:clamp(28px,3.8vw,50px);object-fit:contain;border-radius:.4vw}
.wm-tag{font-size:clamp(5px,.52vw,7px);color:#87CEFA;font-weight:700;letter-spacing:.2vw;text-transform:uppercase;line-height:1}
.wm-name{font-family:'Arial Black',Arial,sans-serif;font-size:clamp(10px,1.4vw,19px);font-weight:900;color:#fff;line-height:1}

/* ════════════════════
   NO LIVE SCREEN
════════════════════ */
#no-live{
  position:fixed;inset:0;background:rgba(0,8,25,.93);
  display:flex;align-items:center;justify-content:center;
  flex-direction:column;gap:1.6vh;z-index:200;
}
#no-live h2{font-size:clamp(12px,1.8vw,26px);color:rgba(135,206,250,.42);font-weight:900;letter-spacing:.35vw;text-transform:uppercase}
#no-live p{font-size:clamp(7px,.8vw,11px);color:rgba(135,206,250,.22);letter-spacing:.18vw}

/* ════════════════════
   CIRCULAR ALERTS
════════════════════ */
.alert{
  position:fixed;top:40%;left:50%;
  transform:translate(-50%,-50%) scale(0);
  width:clamp(150px,24vw,300px);height:clamp(150px,24vw,300px);
  border-radius:50%;display:flex;flex-direction:column;
  align-items:center;justify-content:center;
  z-index:999;pointer-events:none;gap:.18vw;backdrop-filter:blur(6px);
}
.alert.show{animation:aS 3.8s cubic-bezier(.34,1.56,.64,1) forwards}
@keyframes aS{
  0%  {transform:translate(-50%,-50%) scale(0);opacity:0}
  9%  {transform:translate(-50%,-50%) scale(1.1);opacity:1}
  16% {transform:translate(-50%,-50%) scale(.95)}
  22% {transform:translate(-50%,-50%) scale(1.03)}
  28% {transform:translate(-50%,-50%) scale(1);opacity:1}
  76% {transform:translate(-50%,-50%) scale(1);opacity:1}
  100%{transform:translate(-50%,-50%) scale(.7);opacity:0}
}
#alert-six   {background:radial-gradient(circle at 40% 40%,rgba(0,70,15,.93),rgba(0,25,5,.97) 70%);border:clamp(2px,.28vw,4px) solid rgba(0,220,65,.8);box-shadow:0 0 clamp(18px,4vw,65px) rgba(0,200,55,.45)}
#alert-four  {background:radial-gradient(circle at 40% 40%,rgba(0,18,95,.93),rgba(0,6,38,.97) 70%);border:clamp(2px,.28vw,4px) solid rgba(55,135,255,.85);box-shadow:0 0 clamp(18px,4vw,65px) rgba(35,115,255,.45)}
#alert-wicket{background:radial-gradient(circle at 40% 40%,rgba(95,0,0,.93),rgba(38,0,0,.97) 70%);border:clamp(2px,.28vw,4px) solid rgba(255,45,15,.85);box-shadow:0 0 clamp(18px,4vw,65px) rgba(255,35,0,.45)}
.alert-logo  {width:clamp(24px,4vw,55px);height:clamp(24px,4vw,55px);object-fit:contain;border-radius:.6vw;filter:drop-shadow(0 0 .5vw rgba(255,255,255,.4))}
.alert-word  {font-family:'Arial Black',Arial,sans-serif;font-size:clamp(20px,4.4vw,62px);font-weight:900;text-transform:uppercase;line-height:1;animation:aG .5s ease infinite alternate}
@keyframes aG{from{filter:brightness(1)}to{filter:brightness(1.55) drop-shadow(0 0 .5vw currentColor)}}
#alert-six    .alert-word{color:#00ff58}
#alert-four   .alert-word{color:#4aabff}
#alert-wicket .alert-word{color:#ff5533}
.alert-emoji {font-size:clamp(13px,2.4vw,34px);line-height:1}
.alert-player{font-size:clamp(6px,.85vw,11px);color:rgba(220,240,255,.82);font-weight:700;letter-spacing:.08vw;text-align:center;max-width:86%;line-height:1.3}
.alert-ppl   {font-family:'Arial Black',Arial,sans-serif;font-size:clamp(5px,.65vw,9px);font-weight:900;letter-spacing:.42vw;text-transform:uppercase;opacity:.5;margin-top:.1vw}
#alert-six    .alert-ppl{color:#88ffaa}
#alert-four   .alert-ppl{color:#88ccff}
#alert-wicket .alert-ppl{color:#ffaa88}

/* ═══════════════════════════════════════════════════
   SCOREBAR — CSS Grid, full-width, 2-row, PSL style
═══════════════════════════════════════════════════ */
#bar{
  position:fixed;bottom:0;left:0;right:0;
  height:var(--bh);
  display:none;
  /* CSS Grid: 4 columns, 2 rows */
  grid-template-columns: var(--sw) 1fr var(--rw) var(--sw);
  grid-template-rows: var(--r1) calc(100% - var(--r1));
  /* NOTE: display:none overrides grid; JS switches to display:grid */
}

/* ── Left logo: spans both rows ── */
.ll{
  grid-column:1;grid-row:1/3;
  background:linear-gradient(135deg,#003a88,#001f55);
  clip-path:polygon(0 0,78% 0,100% 100%,0 100%);
  display:flex;align-items:center;justify-content:center;
  padding-right:clamp(4px,.6vw,8px);
  z-index:3;
}
.ll img{width:clamp(22px,3.2vw,44px);height:clamp(22px,3.2vw,44px);object-fit:contain;border-radius:50%}

/* ── Green Pill — col 2 row 1, protrudes upward ── */
.pill-wrap{
  grid-column:2;grid-row:1;
  display:flex;align-items:flex-end;
  overflow:visible;
  z-index:10;
}
.pill{
  margin-top:calc(-1 * var(--rise));
  background:linear-gradient(170deg,#ccf200 0%,#b5e000 60%,#a2cc00 100%);
  border-radius:clamp(4px,.6vw,10px) clamp(4px,.6vw,10px) 0 0;
  border:1.5px solid rgba(0,0,0,.1);
  border-bottom:none;
  width:100%;
  display:flex;align-items:center;
  padding:clamp(3px,.5vh,8px) clamp(8px,1.1vw,16px) clamp(2px,.35vh,6px);
  gap:clamp(5px,.8vw,14px);
  box-shadow:0 -4px 18px rgba(0,0,0,.3),inset 0 1px 0 rgba(255,255,255,.35);
}

/* Team abbreviations */
.t-abbr{
  font-family:'Arial Black',Arial,sans-serif;
  font-size:clamp(9px,1.35vw,18px);
  font-weight:900;
  color:#0a1800;
  letter-spacing:.02vw;
  text-transform:uppercase;
  white-space:nowrap;
  line-height:1;
}
.vs-txt{
  font-size:clamp(6px,.75vw,10px);
  color:#3a5200;
  font-weight:600;
  letter-spacing:.05vw;
  line-height:1;
}

/* Score — dominant element */
.score-big{
  font-family:'Arial Black',Arial,sans-serif;
  font-size:clamp(20px,3.8vw,52px);
  font-weight:900;
  color:#000;
  letter-spacing:-.03vw;
  line-height:1;
  white-space:nowrap;
  flex-shrink:0;
}

/* Overs */
.ov-num{
  font-size:clamp(11px,1.55vw,21px);
  font-weight:900;
  color:#0a1800;
  line-height:1;
  white-space:nowrap;
}

/* Innings dot — small dark circle with number */
.inn-dot{
  width:clamp(14px,1.65vw,21px);
  height:clamp(14px,1.65vw,21px);
  border-radius:50%;
  background:rgba(0,0,0,.28);
  border:1.5px solid rgba(0,0,0,.35);
  display:flex;align-items:center;justify-content:center;
  font-size:clamp(6px,.78vw,10px);
  font-weight:900;color:#fff;
  flex-shrink:0;
  letter-spacing:0;
}

/* ── Batter row — col 2 row 2 ── */
.bat-row{
  grid-column:2;grid-row:2;
  background:linear-gradient(90deg,rgba(0,18,60,.98),rgba(0,12,45,.99));
  display:flex;align-items:center;
  padding:0 clamp(6px,.9vw,14px);
  gap:clamp(4px,.55vw,9px);
  border-top:1px solid rgba(135,206,250,.1);
  overflow:hidden;
}
.bat-name{
  font-size:clamp(9px,1.1vw,15px);
  font-weight:900;
  text-transform:uppercase;
  white-space:nowrap;
  letter-spacing:.03vw;
  line-height:1;
}
.bat-name.sn{color:#FFE620}
.bat-name.nn{color:rgba(210,230,255,.88)}
.bat-runs{
  font-family:'Arial Black',Arial,sans-serif;
  font-size:clamp(12px,1.5vw,20px);
  font-weight:900;
  line-height:1;
  white-space:nowrap;
}
.bat-runs.sr{color:#fff}
.bat-runs.nr{color:rgba(190,215,255,.75)}
.bat-balls{
  font-size:clamp(7px,.82vw,11px);
  line-height:1;
  white-space:nowrap;
}
.bat-balls.sb{color:rgba(200,220,255,.45)}
.bat-balls.nb{color:rgba(160,190,240,.38)}
.bat-slash{
  font-size:clamp(13px,1.65vw,22px);
  color:rgba(135,206,250,.25);
  font-weight:300;
  padding:0 clamp(1px,.18vw,3px);
  flex-shrink:0;
}
.bat-star{
  font-size:clamp(9px,1.05vw,14px);
  color:#FFE620;
  font-weight:900;
  margin-left:-2px;
}

/* ── Right panel — col 3, spans both rows ── */
.right-panel{
  grid-column:3;grid-row:1/3;
  display:flex;flex-direction:column;
  background:linear-gradient(180deg,rgba(0,22,68,.97) 0%,rgba(0,14,50,.99) 100%);
  border-left:2px solid rgba(135,206,250,.1);
  overflow:hidden;
}

/* Top half: RUN-RATE label | bowler info | figures */
.rp-top{
  flex:0 0 var(--r1);
  display:flex;align-items:center;
  padding:0 clamp(6px,.9vw,13px);
  gap:clamp(4px,.6vw,10px);
  border-bottom:1px solid rgba(135,206,250,.1);
  overflow:hidden;
}
.rr-lbl{
  font-size:clamp(5px,.58vw,8px);
  font-weight:700;
  color:rgba(175,210,255,.55);
  text-transform:uppercase;
  letter-spacing:.14vw;
  white-space:nowrap;
  line-height:1;
  flex-shrink:0;
}
.rp-divider{
  width:1px;
  height:60%;
  background:rgba(135,206,250,.15);
  flex-shrink:0;
  align-self:center;
}
.bowl-info{
  display:flex;align-items:center;
  gap:clamp(3px,.42vw,6px);
  flex:1;
  min-width:0;
  overflow:hidden;
}
.ball-ico{
  width:clamp(8px,1.1vw,14px);
  height:clamp(8px,1.1vw,14px);
  border-radius:50%;flex-shrink:0;
  background:radial-gradient(circle at 33% 33%,#e82600,#8a0000);
  border:1px solid rgba(255,70,40,.5);
  box-shadow:0 0 4px rgba(220,40,0,.35);
}
.bowl-name{
  font-size:clamp(9px,1.08vw,15px);
  font-weight:900;
  color:#fff;
  text-transform:uppercase;
  letter-spacing:.03vw;
  white-space:nowrap;
  overflow:hidden;
  text-overflow:ellipsis;
}
.bowl-figs{
  display:flex;align-items:center;
  gap:clamp(3px,.4vw,6px);
  flex-shrink:0;
}
.bowl-wk{
  font-size:clamp(8px,1.02vw,14px);
  font-weight:900;
  color:rgba(200,225,255,.75);
  white-space:nowrap;
}
.bowl-ov{
  font-size:clamp(7px,.82vw,11px);
  color:rgba(160,195,255,.5);
  white-space:nowrap;
}

/* Bottom half: run rate number | THIS OVER | balls */
.rp-bot{
  flex:1;
  display:flex;align-items:center;
  padding:0 clamp(6px,.9vw,13px);
  gap:clamp(6px,.9vw,13px);
  overflow:hidden;
}
.rr-num{
  font-family:'Arial Black',Arial,sans-serif;
  font-size:clamp(14px,1.9vw,26px);
  font-weight:900;
  color:#FFD700;
  line-height:1;
  white-space:nowrap;
  text-shadow:0 0 12px rgba(255,215,0,.5);
  flex-shrink:0;
}
.over-block{
  display:flex;align-items:center;
  gap:clamp(3px,.45vw,8px);
  min-width:0;
  overflow:hidden;
}
.over-lbl{
  font-size:clamp(5px,.55vw,7.5px);
  font-weight:700;
  color:rgba(175,210,255,.42);
  text-transform:uppercase;
  letter-spacing:.1vw;
  white-space:nowrap;
  flex-shrink:0;
}
.over-balls{
  display:flex;
  gap:clamp(2px,.32vw,5px);
  align-items:center;
  flex-wrap:nowrap;
}

/* ── Right logo: spans both rows ── */
.rl{
  grid-column:4;grid-row:1/3;
  background:linear-gradient(135deg,#003580,#001e4e);
  clip-path:polygon(22% 0,100% 0,100% 100%,0 100%);
  display:flex;align-items:center;justify-content:center;
  padding-left:clamp(4px,.6vw,8px);
}
.rl img{width:clamp(22px,3.2vw,44px);height:clamp(22px,3.2vw,44px);object-fit:contain;border-radius:50%}

/* ── Ball dots ── */
.oball{
  width:clamp(12px,1.65vw,22px);
  height:clamp(12px,1.65vw,22px);
  border-radius:50%;
  display:flex;align-items:center;justify-content:center;
  font-size:clamp(5px,.68vw,9px);
  font-weight:900;flex-shrink:0;
  box-shadow:inset 0 1px 3px rgba(0,0,0,.28),0 1px 2px rgba(0,0,0,.18);
}
.ob-empty{background:rgba(255,255,255,.04);border:1.5px solid rgba(135,206,250,.18)}
.ob-dot  {background:rgba(85,95,115,.65);border:1.5px solid rgba(135,145,170,.36);color:rgba(255,255,255,.65)}
.ob-run  {background:#1a5810;border:1.5px solid #3a9828;color:#fff}
.ob-four {background:#0035aa;border:1.5px solid #4080ff;color:#fff}
.ob-six  {background:#aa3e00;border:1.5px solid #ff8022;color:#fff}
.ob-wide {background:rgba(90,70,0,.78);border:1.5px solid #886600;color:#ffe000;font-size:clamp(4px,.44vw,6px)}
.ob-nb   {background:rgba(90,70,0,.78);border:1.5px solid #886600;color:#ffe000;font-size:clamp(4px,.43vw,6px)}
.ob-wkt  {background:#990000;border:1.5px solid #ff3322;color:#fff;box-shadow:inset 0 1px 3px rgba(0,0,0,.3),0 0 5px rgba(255,35,0,.3)}

/* ── Portrait fine-tune ── */
@media (orientation:portrait){
  .score-big {font-size:clamp(17px,4.8vw,36px)!important}
  .t-abbr   {font-size:clamp(8px,2.2vw,14px)!important}
  .ov-num   {font-size:clamp(9px,2vw,15px)!important}
  .rr-num   {font-size:clamp(12px,2.9vw,21px)!important}
  .bowl-name{font-size:clamp(8px,1.9vw,13px)!important}
  .bat-name {font-size:clamp(8px,1.9vw,13px)!important}
  .bat-runs {font-size:clamp(10px,2.5vw,17px)!important}
  .oball    {width:clamp(10px,2.7vw,17px)!important;height:clamp(10px,2.7vw,17px)!important}
}
</style>
</head>
<body>

<!-- Sponsor -->
<div id="sponsor">
  <div class="sponsor-box">
    <div class="sname">KM&amp;S Complex</div>
    <div class="stag">✦ Sponsored By ✦</div>
  </div>
</div>

<!-- Watermark -->
<div id="watermark">
  <img src="https://ppl2026-frontend.onrender.com/icons/icon-192.png" alt="PPL" onerror="this.style.display='none'">
  <div>
    <div class="wm-tag">Official</div>
    <div class="wm-name">PPL 2026</div>
  </div>
</div>

<!-- No live -->
<div id="no-live">
  <h2>⏳ Waiting for Live Match</h2>
  <p>Overlay activates when scoring begins</p>
</div>

<!-- Alerts -->
<div class="alert" id="alert-six">
  <img class="alert-logo" src="https://ppl2026-frontend.onrender.com/icons/icon-192.png" alt="">
  <div class="alert-emoji">🚀</div>
  <div class="alert-word">SIX!</div>
  <div class="alert-player" id="six-player"></div>
  <div class="alert-ppl">PPL 2026</div>
</div>
<div class="alert" id="alert-four">
  <img class="alert-logo" src="https://ppl2026-frontend.onrender.com/icons/icon-192.png" alt="">
  <div class="alert-emoji">⚡</div>
  <div class="alert-word">FOUR!</div>
  <div class="alert-player" id="four-player"></div>
  <div class="alert-ppl">PPL 2026</div>
</div>
<div class="alert" id="alert-wicket">
  <img class="alert-logo" src="https://ppl2026-frontend.onrender.com/icons/icon-192.png" alt="">
  <div class="alert-emoji">💀</div>
  <div class="alert-word">WICKET!</div>
  <div class="alert-player" id="wkt-player"></div>
  <div class="alert-ppl">PPL 2026</div>
</div>

<!-- ═══════════════════ SCOREBAR ═══════════════════
  Grid layout:
  col1=left-logo  col2=center(pill/bats)  col3=right-panel  col4=right-logo
  row1=top        row2=bottom
  Right panel spans row1+row2
══════════════════════════════════════════════════ -->
<div id="bar">

  <!-- Left logo (spans both rows) -->
  <div class="ll">
    <img src="https://ppl2026-frontend.onrender.com/icons/icon-192.png" alt="" onerror="this.style.display='none'">
  </div>

  <!-- GREEN PILL (row 1 center) -->
  <div class="pill-wrap">
    <div class="pill">
      <span class="t-abbr" id="t-field">FLD</span>
      <span class="vs-txt">v</span>
      <span class="t-abbr" id="t-bat">BAT</span>
      <span class="score-big" id="score">0-0</span>
      <span class="ov-num" id="overs">0.0</span>
      <div class="inn-dot" id="inn">1</div>
    </div>
  </div>

  <!-- BATTER ROW (row 2 center) -->
  <div class="bat-row">
    <span class="bat-name sn" id="st-name">STRIKER</span>
    <span class="bat-star">*</span>
    <span class="bat-runs sr" id="st-runs">0</span>
    <span class="bat-balls sb" id="st-balls">0</span>
    <span class="bat-slash">/</span>
    <span class="bat-name nn" id="ns-name">NON-STR</span>
    <span class="bat-runs nr" id="ns-runs">0</span>
    <span class="bat-balls nb" id="ns-balls">0</span>
  </div>

  <!-- RIGHT PANEL (spans both rows) -->
  <div class="right-panel">

    <!-- Top: RUN-RATE label | bowler name | figures -->
    <div class="rp-top">
      <span class="rr-lbl" id="rr-lbl">RUN-RATE</span>
      <div class="rp-divider"></div>
      <div class="bowl-info">
        <div class="ball-ico"></div>
        <span class="bowl-name" id="bowl-name">BOWLER</span>
      </div>
      <div class="bowl-figs">
        <span class="bowl-wk" id="bowl-wk">0-0</span>
        <span class="bowl-ov" id="bowl-ov">0.0</span>
      </div>
    </div>

    <!-- Bottom: run rate number | THIS OVER | balls -->
    <div class="rp-bot">
      <span class="rr-num" id="rr-num">0.00</span>
      <div class="over-block">
        <span class="over-lbl">THIS OVER</span>
        <div class="over-balls" id="over-balls"></div>
      </div>
    </div>

  </div><!-- /.right-panel -->

  <!-- Right logo (spans both rows) -->
  <div class="rl">
    <img src="https://ppl2026-frontend.onrender.com/icons/icon-192.png" alt="" onerror="this.style.display='none'">
  </div>

</div><!-- /#bar -->

<script>
const API='https://ppl2026-backend.onrender.com/api/live';
let prevLast=null,alertTimer=null,lastMatchId=null;

/* Abbreviation: first letter of each word (max 3 chars) */
function abbr(n){
  if(!n)return'???';
  const w=n.trim().split(/\s+/);
  if(w.length>=2) return w.map(x=>x[0]).join('').toUpperCase().slice(0,3);
  return n.trim().toUpperCase().slice(0,3);
}
function firstName(n){
  if(!n)return'—';
  return n.trim().split(/\s+/)[0].toUpperCase();
}

function ballCls(b){
  if(b==='W') return'ob-wkt';
  if(b==='6') return'ob-six';
  if(b==='4') return'ob-four';
  if(b==='Wd')return'ob-wide';
  if(b==='NB')return'ob-nb';
  if(b==='•'||b==='0')return'ob-dot';
  return'ob-run';
}
function ballLbl(b){return b==='•'?'0':b}

function showAlert(id,line){
  document.querySelectorAll('.alert').forEach(e=>e.classList.remove('show'));
  if(alertTimer)clearTimeout(alertTimer);
  const el=document.getElementById(id);
  void el.offsetWidth;
  el.classList.add('show');
  const pid=id==='alert-six'?'six-player':id==='alert-four'?'four-player':'wkt-player';
  document.getElementById(pid).textContent=line||'';
  alertTimer=setTimeout(()=>el.classList.remove('show'),3800);
}

async function update(){
  try{
    const res=await fetch(API,{cache:'no-store'});
    const json=await res.json();
    const d=json.data??json;

    const bar=document.getElementById('bar');
    if(!d||!d.matchId){
      bar.style.display='none';
      document.getElementById('no-live').style.display='flex';
      lastMatchId=null;prevLast=null;return;
    }
    bar.style.display='grid';   /* ← CSS Grid, not flex */
    document.getElementById('no-live').style.display='none';
    if(d.matchId!==lastMatchId){lastMatchId=d.matchId;prevLast=null}

    const batting =d.innings===2?d.bowlingFirst:d.battingFirst;
    const fielding=d.innings===2?d.battingFirst:d.bowlingFirst;

    /* Team abbreviations in pill (like PSL: PZ, RP) */
    document.getElementById('t-bat').textContent=abbr(batting);
    document.getElementById('t-field').textContent=abbr(fielding);

    document.getElementById('score').textContent=`${d.runs}-${d.wickets}`;
    document.getElementById('inn').textContent=d.innings===2?'2':'1';

    const ov=Math.floor(d.balls/6),bl=d.balls%6;
    document.getElementById('overs').textContent=`${ov}.${bl}`;

    /* Run rate */
    const crr=d.balls>0?(d.runs/(d.balls/6)).toFixed(2):'0.00';
    if(d.innings===2&&d.target){
      const needed=d.target-d.runs;
      const remB=Math.max(0,(10-ov)*6-bl);
      const rrr=remB>0?(needed/(remB/6)).toFixed(2):'—';
      document.getElementById('rr-lbl').textContent='REQ RATE';
      document.getElementById('rr-num').textContent=rrr;
    }else{
      document.getElementById('rr-lbl').textContent='RUN-RATE';
      document.getElementById('rr-num').textContent=crr;
    }

    /* Bowler */
    const b=d.currentBowler;
    if(b&&b.name){
      const bov=Math.floor((b.ballsBowled||0)/6),bbl=(b.ballsBowled||0)%6;
      document.getElementById('bowl-name').textContent=firstName(b.name);
      document.getElementById('bowl-wk').textContent=`${b.runsConceded||0}-${b.wickets||0}`;
      document.getElementById('bowl-ov').textContent=`${bov}.${bbl}`;
    }

    /* Batters */
    const st=d.striker;
    if(st&&st.name){
      document.getElementById('st-name').textContent=firstName(st.name);
      document.getElementById('st-runs').textContent=st.runs||0;
      document.getElementById('st-balls').textContent=st.balls||0;
    }
    const ns=d.nonstriker;
    if(ns&&ns.name){
      document.getElementById('ns-name').textContent=firstName(ns.name);
      document.getElementById('ns-runs').textContent=ns.runs||0;
      document.getElementById('ns-balls').textContent=ns.balls||0;
    }

    /* Over balls */
    const allBalls=d.lastBalls||[];
    const curBalls=allBalls.slice(ov*6);
    const ballsDiv=document.getElementById('over-balls');
    ballsDiv.innerHTML='';
    for(let i=0;i<7;i++){
      const div=document.createElement('div');
      div.className='oball';
      if(i<curBalls.length){
        div.classList.add(ballCls(curBalls[i]));
        div.textContent=ballLbl(curBalls[i]);
      }else{
        div.classList.add('ob-empty');
      }
      ballsDiv.appendChild(div);
    }

    /* Alerts */
    const latest=allBalls[allBalls.length-1];
    if(latest!==prevLast&&prevLast!==null){
      const stLine=st?.name?`${st.name}  ${st.runs}(${st.balls})`:'';
      if(latest==='6')showAlert('alert-six',stLine);
      else if(latest==='4')showAlert('alert-four',stLine);
      else if(latest==='W')showAlert('alert-wicket',stLine);
    }
    prevLast=latest;
  }catch(e){console.error('[PPL]',e)}
}
update();
setInterval(update,1000);
</script>
</body>
</html>
