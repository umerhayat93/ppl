services:
  - type: web
    name: ppl2026-backend
    env: node
    region: singapore
    plan: free
    buildCommand: npm install && npm run prisma:generate && npm run prisma:migrate && npm run build
    startCommand: npm run start:prod
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: ppl2026-db
          property: connectionString
      - key: REDIS_URL
        fromService:
          name: ppl2026-redis
          type: redis
          property: connectionString
      - key: JWT_SECRET
        generateValue: true
      - key: ADMIN_USER
        value: ppl2026
      - key: ADMIN_PASS
        value: ppl@2620
      - key: FRONTEND_URL
        value: https://ppl2026-frontend.onrender.com
      - key: NODE_ENV
        value: production

databases:
  - name: ppl2026-db
    databaseName: ppl2026
    region: singapore
    plan: free

  - name: ppl2026-redis
    type: redis
    region: singapore
    plan: free
    ipAllowList: []
